<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#2D2D2D;font-size:16px;line-height:1.6;background:#F7F7F7;padding:1rem}
.wrap{max-width:960px;margin:0 auto;background:#fff;border-radius:12px;padding:1.5rem;min-height:100vh;border:1px solid #e0e0e0}
.nav{display:flex;gap:6px;padding-bottom:12px;border-bottom:1px solid #ddd;margin-bottom:1.25rem;align-items:center}
.nb{background:none;border:none;padding:6px 16px;cursor:pointer;border-radius:8px;color:#626367;font-size:14px}
.nb.active{background:#4F5053;color:#fff;font-weight:600}
.nb:hover:not(.active){background:#F7F7F7;color:#2D2D2D}
.btn{padding:7px 16px;border:1px solid #ccc;background:#fff;border-radius:8px;cursor:pointer;font-size:14px;color:#2D2D2D}
.btn:hover{background:#F7F7F7}
.btn.p{background:#F15D1B;color:#fff;border-color:transparent}
.btn.p:hover{background:#d44e14}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.dr{color:#c0392b;border-color:#e0b0b0}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem}
.pb{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;background:#F15D1B;transition:width .3s}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.b-ok{background:#EAF3DE;color:#2d7a2d}
.b-warn{background:#FAEEDA;color:#854F0B}
.b-info{background:#F7F7F7;color:#4F5053}
.b-ik{background:#E1F5EE;color:#0F6E56}
.b-no{background:#F7F7F7;color:#626367}
.b-red{background:#FCEBEB;color:#A32D2D}
.b-ora{background:#FDE8DC;color:#d44e14}
input,select{font-family:inherit;font-size:15px;font-weight:500;color:#2D2D2D;background:#fff;border:1px solid #ccc;border-radius:8px;padding:9px 12px;width:100%}
input[type=checkbox]{width:auto;accent-color:#F15D1B;transform:scale(1.2)}
input:focus,select:focus{outline:none;box-shadow:0 0 0 2px #F5C5A8;border-color:#F15D1B}
label{font-size:11px;color:#626367;font-weight:700;text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:5px}
.fg{margin-bottom:12px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.ifrm{background:#F7F7F7;border:2px solid #F15D1B;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.tog-wrap{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;user-select:none}
.tog{width:36px;height:20px;background:#ccc;border-radius:10px;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:#F15D1B}
.tog::after{content:'';position:absolute;width:14px;height:14px;background:white;border-radius:50%;top:3px;left:3px;transition:left .2s}
.tog.on::after{left:19px}
.step-item{padding:14px 16px;border-radius:12px;cursor:pointer;transition:transform .25s,opacity .25s,filter .25s;margin-bottom:8px;border:1px solid #e0e0e0;background:#fff}
.step-item.s-active{border:1px solid #F5C5A8;border-left:3px solid #F15D1B}
.step-item.s-done{background:#EAF3DE;border-color:#C0DD97}
.snum{width:26px;height:26px;border-radius:50%;background:#FDE8DC;color:#F15D1B;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.snum.dn{background:#EAF3DE;color:#2d7a2d}
.tag{display:inline-flex;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;background:#F7F7F7;color:#626367;margin-right:4px}
.ord-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;cursor:pointer;transition:border-color .18s}
.ord-card:hover{border-color:#F5C5A8;border-left:3px solid #F15D1B}
.ord-card.wire-urgent{border-color:#f09595;border-left:3px solid #E24B4A}
.ord-card.wire-overdue{border-color:#E24B4A;border-left:3px solid #A32D2D;background:#FFF8F8}
.div-alert{background:#FCEBEB;border:1px solid #f09595;border-radius:8px;padding:8px 12px;font-size:13px;color:#A32D2D;font-weight:600;margin-top:10px}
.save-bar{position:fixed;bottom:16px;right:16px;background:#4F5053;color:#fff;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;display:none;z-index:999}
.save-bar.vis{display:block}
.err-bar{position:fixed;bottom:16px;right:16px;background:#c0392b;color:#fff;font-size:12px;font-weight:600;padding:8px 16px;border-radius:20px;display:none;z-index:999}
.err-bar.vis{display:block}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-bar select{width:auto;font-size:13px;padding:6px 10px}
</style>
</head>

var USER_MAP = {

var currentUser = null;

function showLogin(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}
function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
}

document.getElementById('login-btn').onclick = function(){
  var u = (document.getElementById('l-user').value||'').trim().toLowerCase();
  var p = (document.getElementById('l-pass').value||'').trim();
  var email = USER_MAP[u];
  var btn = document.getElementById('login-btn');
  document.getElementById('login-err').style.display='none';
  if(!email){ document.getElementById('login-err').style.display='block'; return; }
  btn.textContent='Entrando...'; btn.disabled=true;
  auth.signInWithEmailAndPassword(email, p)
    .then(function(cred){
      currentUser = NAME_MAP[cred.user.email] || cred.user.email;
      showApp();
      btn.textContent='Entrar \u2192'; btn.disabled=false;
      init();
    })
    .catch(function(){
      document.getElementById('login-err').style.display='block';
      document.getElementById('l-pass').value='';
      btn.textContent='Entrar \u2192'; btn.disabled=false;
    });
};

document.addEventListener('keydown', function(e){
  if(e.key==='Enter' && document.getElementById('login-screen').style.display!=='none'){
    document.getElementById('login-btn').onclick();
  }
});

function logout(){
  auth.signOut().then(function(){ currentUser=null; showLogin(); });
}

auth.onAuthStateChanged(function(user){
  if(user){
    currentUser = NAME_MAP[user.email] || user.email;
    showApp();
    init();
  }
});

var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyAhI-jMXrH8gBOYvHgugrrRw2gdwlRsDAWu014WnJhPyKBcqZ0UG9fHfHnOFOyg9xVVw/exec';

var STEPS = [
  {n:1,lbl:'Confirmar com gestão o valor do aporte',resp:'Operações',prazo:'D+0'},
  {n:2,lbl:'Confirmar data limite de envio wire e subdoc assinado com a casa',resp:'Operações',prazo:'D+0'},
  {n:3,lbl:'Lançar no TERA APP',resp:'Gestão',prazo:'D+0'},
  {n:4,lbl:'Pedir documentos para a casa',resp:'Operações',prazo:'D+0'},
  {n:5,lbl:'Descobrir data de liquidação de resgate com a casa / Atualizar data no TeraApp',resp:'Operações',prazo:'Assim que confirmar data e valor'},
  {n:6,lbl:'Preencher subdoc e pedir validação contraparte',resp:'Operações',prazo:'SLA 3 dias úteis'},
  {n:7,lbl:'Checar cadastro na CANOE / Solicitar cadastro e enviar e-mail da CANOE junto com OPS',resp:'Operações',prazo:'SLA 3 dias úteis'},
  {n:8,lbl:'Confirmar caixa, preparar carta wire e enviar para assinatura',resp:'Operações',prazo:'SLA 3 dias úteis'},
  {n:9,lbl:'Enviar documento e wire para RI — assinatura do cliente (confirmar se via Docusign)',resp:'Operações',prazo:'SLA 3 dias úteis'},
  {n:10,lbl:'Enviar documento assinado para a casa',resp:'Operações',prazo:'No mesmo dia que recebermos do RI'},
  {n:11,lbl:'Enviar wire instructions assinada para o banco do cliente processar',resp:'Operações',prazo:'Assim que definida a data internamente'},
  {n:12,lbl:'Pedir confirmação da contraparte sobre finalização do processo',resp:'Operações',prazo:'Assim que enviado a wire'},
  {n:13,lbl:'Lançar ponta ativo/passivo no Addepar',resp:'Operações',prazo:'Assim que finalizado'},
  {n:14,lbl:'Lançar no LOTE45 (se TERA HF, TERA CORE BONDS ou TERA TREND FOLLOWING)',resp:'Operações',prazo:'Assim que finalizado'},
  {n:15,lbl:'Salvar documentação na rede (versão assinada)',resp:'Operações',prazo:'Assim que finalizado'},
  {n:16,lbl:'Avisar administrador do fundo sobre a movimentação',resp:'Operações',prazo:'Assim que finalizado'},
  {n:17,lbl:'Avisar gestão sobre a finalização do processo',resp:'Operações',prazo:'Assim que tiver confirmação da casa'}
];

var ADMINS_DEF=['The Catalyst Group','Apex Group','Alter Domus','Augentius','Aztec Group','BNY Mellon','Carey Olsen','Citi Fund Services','Citco','Conyers','Deutsche Bank','Elysium Fund Management','HedgeServ','HSBC Securities Services','Intertrust Group','IQ EQ','JPMorgan Chase','Mainstream Group','Maples Group','Mourant','NAV Consulting','Northern Trust','Ogier','SEI Investments','SS&C Technologies','State Street','TMF Group','Trident Trust','UBS Fund Services','Vistra','Walkers Fund Services','AQR Capital Management','Anchorage Capital Group','Appaloosa Management','Balyasny Asset Management','Baupost Group','Brevan Howard','Bridgewater Associates','Capula Investment Management','Citadel','Coatue Management','D.E. Shaw','Elliott Management','Glenview Capital Management','Graham Capital Management','Greenlight Capital','Jana Partners','King Street Capital','Lone Pine Capital','Man Group','Marshall Wace','Millennium Management','Pershing Square Capital Management','Point72 Asset Management','Renaissance Technologies','Sculptor Capital Management','Third Point','Tiger Global Management','Two Sigma','Viking Global Investors','Winton Group'];
var DF_INV=['Euskadi Investments Ltd.','Olympic Bahamas Ltd.','RM Fund Ltd.','CB Fund LP','Graybar Financial Services Corporation','AMGS Investments Ltd.','Bagli Limited','Wentworth Fund Icon','Peachbay International Corp','Teesdale Corporation','Tera Global SPC - Tera HF SP','Tera Global SPC - Tera Core Bonds SP','Tera Global SPC - Tera Trend Following SP','Duvall Enterprises Inc.','Fide Co Ltd.','Triboju Ltd.'];
var DF_IVD=['TERA HF SP','TERA CORE BONDS SP','TERA TREND FOLLOWING SP'];
var DF_FUNDS={investidor:DF_INV,investido:DF_IVD,admins:ADMINS_DEF};

var S={view:'orders',orders:[],funds:JSON.parse(JSON.stringify(DF_FUNDS)),selId:null,showForm:false,focusStep:0,loading:true,filters:{fiv:'',tipo:'',status:''},editId:null};
var _ik=false,_saveTimer=null,_refreshTimer=null;

function lsLoad(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function showSave(){var b=document.getElementById('save-bar');if(b){b.className='save-bar vis';clearTimeout(_saveTimer);_saveTimer=setTimeout(function(){b.className='save-bar';},2000);}}
function showErr(){var b=document.getElementById('err-bar');if(b){b.className='err-bar vis';setTimeout(function(){b.className='err-bar';},4000);}}

function init(){
  S.loading=true;
  if(_refreshTimer){clearInterval(_refreshTimer);_refreshTimer=null;}
  fetch(SCRIPT_URL+'?action=getData&t='+Date.now())
    .then(function(r){return r.text();})
    .then(function(txt){
      var data=JSON.parse(txt);
      S.orders=data.orders||[];
      S.funds=data.funds||JSON.parse(JSON.stringify(DF_FUNDS));
      S.loading=false;R();
      _refreshTimer=setInterval(autoRefresh,2000);
    })
    .catch(function(){
      S.orders=lsLoad('sd_orders')||[];
      S.funds=lsLoad('sd_funds')||JSON.parse(JSON.stringify(DF_FUNDS));
      S.loading=false;R();
      _refreshTimer=setInterval(autoRefresh,2000);
    });
}

function autoRefresh(){
  if(S.showForm)return;
  fetch(SCRIPT_URL+'?action=getData&t='+Date.now())
    .then(function(r){return r.text();})
    .then(function(txt){
      var data=JSON.parse(txt);
      var no=JSON.stringify(data.orders||[]);
      var nf=JSON.stringify(data.funds||{});
      if(no!==JSON.stringify(S.orders)||nf!==JSON.stringify(S.funds)){
        S.orders=data.orders||[];
        S.funds=data.funds||JSON.parse(JSON.stringify(DF_FUNDS));
        R();
      }
    }).catch(function(){});
}

function saveO(){lsSave('sd_orders',S.orders);showSave();fetch(SCRIPT_URL+'?action=save&type=orders&data='+encodeURIComponent(JSON.stringify(S.orders))).catch(function(){showErr();});}
function saveF(){lsSave('sd_funds',S.funds);showSave();fetch(SCRIPT_URL+'?action=save&type=funds&data='+encodeURIComponent(JSON.stringify(S.funds))).catch(function(){showErr();});}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function pct(o){return Math.round(o.steps.filter(function(s){return s.done;}).length/STEPS.length*100);}
function status(o){var p=pct(o);return p===100?'Conclu\u00eddo':p===0?'N\u00e3o iniciado':'Em andamento';}
function bcls(o){var p=pct(o);return p===100?'b-ok':p===0?'b-info':'b-warn';}
function fmtV(o){if(!o.valor)return'\u2014';try{return new Intl.NumberFormat('pt-BR',{style:'currency',currency:o.moeda||'USD',maximumFractionDigits:0}).format(o.valor);}catch(e){return o.valor;}}
function fmtNum(v,m){if(!v&&v!==0)return'\u2014';try{return new Intl.NumberFormat('pt-BR',{style:'currency',currency:m||'USD',maximumFractionDigits:0}).format(v);}catch(e){return v;}}
function fmtD(d){if(!d)return null;var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function DL(){return '<datalist id="gest-dl">'+(S.funds.admins||ADMINS_DEF).map(function(g){return '<option value="'+esc(g)+'">';}).join('')+'</datalist>';}

function wireStatus(o){
  if(!o.wire)return null;
  var today=new Date();today.setHours(0,0,0,0);
  var wd=new Date(o.wire+'T00:00:00');
  var diff=Math.round((wd-today)/(1000*60*60*24));
  if(diff<0)return{cls:'wire-overdue',badge:'b-red',lbl:'Wire vencida'};
  if(diff===0)return{cls:'wire-urgent',badge:'b-red',lbl:'Wire hoje'};
  if(diff===1)return{cls:'wire-urgent',badge:'b-ora',lbl:'Wire amanh\u00e3'};
  if(diff===2)return{cls:'wire-urgent',badge:'b-ora',lbl:'Wire em 2 dias'};
  return{cls:'',badge:'b-info',lbl:'Wire: '+fmtD(o.wire)};
}
function hasDivergence(o){if(!o.valorConfirmado&&o.valorConfirmado!==0)return false;return parseFloat(o.valorConfirmado)!==parseFloat(o.valor);}

function LOGO_SVG(w,h){return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 90 34" xmlns="http://www.w3.org/2000/svg"><text x="0" y="30" font-family="-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif" font-size="34" font-weight="700" fill="#4F5053">TER</text><text x="61" y="30" font-family="-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif" font-size="34" font-weight="700" fill="#F15D1B">A</text></svg>';}

function R(){
  var root=document.getElementById('root');if(!root)return;
  if(S.loading){root.innerHTML='<div style="text-align:center;padding:4rem;color:#626367"><div style="font-size:14px;color:#F15D1B;font-weight:600">Carregando dados...</div></div>';return;}
  try{
    var h='<div class="nav">';
    h+=LOGO_SVG(56,22);
    h+='<button class="nb'+(S.view!=='funds'?' active':'')+'" onclick="go(\'orders\')">Ordens</button>';
    h+='<button class="nb'+(S.view==='funds'?' active':'')+'" onclick="go(\'funds\')">Fundos</button>';
    h+='<div style="margin-left:auto;display:flex;align-items:center;gap:10px">';
    h+='<span style="font-size:13px;color:#626367">'+esc(currentUser||'')+'</span>';
    h+='<button class="btn sm dr" onclick="logout()">Sair</button></div></div>';
    if(S.view==='orders')h+=vOrders();
    else if(S.view==='detail')h+=vDetail();
    else if(S.view==='funds')h+=vFunds();
    root.innerHTML=h;
  }catch(err){
    root.innerHTML='<div style="padding:2rem;color:#c0392b;font-size:13px">Erro ao renderizar: '+err.message+'<br><button class="btn sm" onclick="go(\'orders\')">Voltar</button></div>';
    console.error('Render error:',err);
  }
}

function vOrders(){
  var all=S.orders;
  var concl=all.filter(function(o){return pct(o)===100;}).length;
  var and=all.filter(function(o){var p=pct(o);return p>0&&p<100;}).length;
  var urgent=all.filter(function(o){var w=wireStatus(o);return w&&w.cls!=='';}).length;
  var os=all.slice();
  var fFiv=S.filters.fiv,fTipo=S.filters.tipo,fSt=S.filters.status;
  if(fFiv)os=os.filter(function(o){return o.fiv===fFiv;});
  if(fTipo)os=os.filter(function(o){return o.tipo===fTipo;});
  if(fSt==='Conclu\u00eddo')os=os.filter(function(o){return pct(o)===100;});
  else if(fSt==='Em andamento')os=os.filter(function(o){var p=pct(o);return p>0&&p<100;});
  else if(fSt==='\u00e3o iniciado')os=os.filter(function(o){return pct(o)===0;});
  else if(fSt==='Urgente')os=os.filter(function(o){var w=wireStatus(o);return w&&w.cls!=='';});

  var h='<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.5rem">';
  h+='<div><div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#F15D1B;font-weight:700;margin-bottom:4px">Offshore &amp; Onshore</div>';
  h+='<h1 style="font-size:26px;font-weight:700;color:#2D2D2D">Demandas Operations</h1></div>';
  h+='<button class="btn p" onclick="togForm()">+ Nova ordem</button></div>';

  h+='<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem">';

function saveEditOrd(id){
  var o=S.orders.filter(function(x){return x.id===id;})[0];
  if(!o)return;
  o.fi=document.getElementById('e-fi').value;
  o.fiv=document.getElementById('e-fiv').value;
  o.gestora=document.getElementById('e-gest').value.trim();
  o.tipo=document.getElementById('e-tipo').value;
  o.valor=parseFloat(document.getElementById('e-val').value)||0;
  var moeEl=document.getElementById('e-moe');
  o.moeda=o.inKind?'SHARES':(moeEl?moeEl.value:'USD');
  o.wire=document.getElementById('e-wire').value||null;
  S.editId=null;
  saveO();R();
}
function setFilter(k,v){S.filters[k]=v;R();}
function clearFilters(){S.filters={fiv:'',tipo:'',status:''};R();}
function openDet(id){
  S.selId=id;S.view='detail';
  var o=S.orders.filter(function(x){return x.id===id;})[0];
  if(o){var idx=-1;for(var i=0;i<o.steps.length;i++){if(!o.steps[i].done){idx=i;break;}}S.focusStep=idx<0?0:idx;}
  R();
}
function togForm(){
  S.showForm=!S.showForm;_ik=false;R();
  if(S.showForm)setTimeout(function(){var f=document.getElementById('new-order-form');if(f)f.scrollIntoView({behavior:'smooth',block:'start'});},60);
}
function togIK(){
  _ik=!_ik;
  var t=document.getElementById('ik-tog');var l=document.getElementById('ik-lbl');
  if(t)t.className='tog'+(_ik?' on':'');
  if(l)l.textContent=_ik?'Sim':'N\u00e3o';
}
function setFocus(i){S.focusStep=i;R();}
function navStep(i){if(i>=0&&i<STEPS.length){S.focusStep=i;R();}}
function createOrd(){
  var o={id:uid(),fi:document.getElementById('f-fi').value,fiv:document.getElementById('f-fiv').value,gestora:document.getElementById('f-gest').value.trim(),tipo:document.getElementById('f-tipo').value,valor:parseFloat(document.getElementById('f-val').value)||0,moeda:_ik?'SHARES':(document.getElementById('f-moe')?document.getElementById('f-moe').value:'USD'),wire:document.getElementById('f-wire').value||null,inKind:_ik,valorConfirmado:null,steps:STEPS.map(function(){return{done:false,obs:''};},this),createdAt:new Date().toISOString()};
  S.orders.unshift(o);S.showForm=false;saveO();R();
}
function delOrd(id){S.orders=S.orders.filter(function(o){return o.id!==id;});S.view='orders';saveO();R();}
function togStep(id,idx,val){var o=S.orders.filter(function(x){return x.id===id;})[0];if(!o)return;o.steps[idx].done=val;saveO();R();}
function updObs(el){var o=S.orders.filter(function(x){return x.id===el.dataset.oid;})[0];if(o){o.steps[parseInt(el.dataset.idx)].obs=el.value;saveO();}}
function updConfirmado(id,val){var o=S.orders.filter(function(x){return x.id===id;})[0];if(!o)return;o.valorConfirmado=val===''?null:parseFloat(val);saveO();R();}
function resetSt(id){var o=S.orders.filter(function(x){return x.id===id;})[0];if(!o)return;o.steps.forEach(function(s){s.done=false;s.obs='';});saveO();R();}
function addF(t){if(!S.funds[t])S.funds[t]=[];S.funds[t].push('');saveF();R();}
function editF(t,i,v){S.funds[t][i]=v;saveF();}
function rmvF(t,i){S.funds[t].splice(i,1);saveF();R();}
</script>
</body>
</html>
