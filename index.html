<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#2D2D2D;font-size:16px;line-height:1.6;background:#F7F7F7;padding:1rem}
.wrap{max-width:1100px;margin:0 auto;background:#fff;border-radius:12px;padding:1.5rem;min-height:100vh;border:1px solid #e0e0e0}
.nav{display:flex;gap:6px;padding-bottom:12px;border-bottom:1px solid #ddd;margin-bottom:1.25rem;align-items:center;flex-wrap:wrap}
.nb{background:none;border:none;padding:6px 16px;cursor:pointer;border-radius:8px;color:#626367;font-size:14px}
.hub-card{background:#FCE5D4;border:1.5px solid #F8C9A6;border-radius:12px;padding:22px 14px;cursor:pointer;font-size:14.5px;font-weight:600;color:#7A3C10;text-align:center;transition:all .15s ease;min-height:78px;display:flex;align-items:center;justify-content:center;font-family:inherit;will-change:transform,opacity}
.hub-card:hover{background:#F8C9A6;border-color:#F15D1B;color:#7A3C10;transform:translateY(-1px);box-shadow:0 4px 12px rgba(241,93,27,.15)}
.hub-card.disabled{background:#F0EEEC;border-color:#DDD8D2;color:#9A958F;cursor:pointer}
.hub-card.disabled:hover{background:#E5E1DC;border-color:#C5C0BB;color:#7A756F;transform:none;box-shadow:none}
.cotas-owner-cell:hover{background:#FCE5D4;border-color:#F8C9A6 !important;color:#7A3C10}
.hub-card.opening{animation:hubOpenAnim .28s cubic-bezier(.32,.72,.4,1) forwards;pointer-events:none;z-index:50}
@keyframes hubOpenAnim{
  0%{transform:scale(1);opacity:1}
  50%{transform:scale(1.06);opacity:1;box-shadow:0 8px 24px rgba(241,93,27,.25)}
  100%{transform:scale(1.4);opacity:0}
}
.page-enter{animation:pageEnter .26s cubic-bezier(.32,.72,.4,1) forwards}
@keyframes pageEnter{
  0%{transform:scale(.96);opacity:0}
  100%{transform:scale(1);opacity:1}
}
.nb.active{background:#4F5053;color:#fff;font-weight:600}
.nb:hover:not(.active){background:#F7F7F7;color:#2D2D2D}
.btn{padding:7px 16px;border:1px solid #ccc;background:#fff;border-radius:8px;cursor:pointer;font-size:14px;color:#2D2D2D}
.btn:hover{background:#F7F7F7}
.btn.p{background:#F15D1B;color:#fff;border-color:transparent}
.btn.p:hover{background:#d44e14}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.dr{color:#c0392b;border-color:#e0b0b0}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem}
.pb{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;background:#F15D1B;transition:width .3s}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.b-ok{background:#EAF3DE;color:#2d7a2d}
.b-warn{background:#FAEEDA;color:#854F0B}
.b-info{background:#F7F7F7;color:#4F5053}
.b-ik{background:#E1F5EE;color:#0F6E56}
.b-no{background:#F7F7F7;color:#626367}
.b-red{background:#FCEBEB;color:#A32D2D}
.b-ora{background:#FDE8DC;color:#d44e14}
input,select,textarea{font-family:inherit;font-size:15px;font-weight:500;color:#2D2D2D;background:#fff;border:1px solid #ccc;border-radius:8px;padding:9px 12px;width:100%}
textarea{resize:vertical;min-height:60px;font-size:13px}
input[type=checkbox]{width:auto;accent-color:#F15D1B;transform:scale(1.2)}
input:focus,select:focus,textarea:focus{outline:none;box-shadow:0 0 0 2px #F5C5A8;border-color:#F15D1B}
label{font-size:11px;color:#626367;font-weight:700;text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:5px}
.fg{margin-bottom:12px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.fr4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.ifrm{background:#F7F7F7;border:2px solid #F15D1B;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.tog-wrap{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;user-select:none}
.tog{width:36px;height:20px;background:#ccc;border-radius:10px;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:#F15D1B}
.tog::after{content:'';position:absolute;width:14px;height:14px;background:white;border-radius:50%;top:3px;left:3px;transition:left .2s}
.tog.on::after{left:19px}
.step-item{padding:14px 16px;border-radius:12px;cursor:pointer;transition:transform .25s,opacity .25s,filter .25s;margin-bottom:8px;border:1px solid #e0e0e0;background:#fff}
.step-item.s-active{border:1px solid #F5C5A8;border-left:3px solid #F15D1B}
.step-item.s-done{background:#EAF3DE;border-color:#C0DD97}
.snum{width:26px;height:26px;border-radius:50%;background:#FDE8DC;color:#F15D1B;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.snum.dn{background:#EAF3DE;color:#2d7a2d}
.tag{display:inline-flex;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;background:#F7F7F7;color:#626367;margin-right:4px}
.ord-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;cursor:pointer;transition:border-color .18s}
.ord-card:hover{border-color:#F5C5A8;border-left:3px solid #F15D1B}
.ord-card.wire-urgent{border-color:#f09595;border-left:3px solid #E24B4A}
.ord-card.wire-overdue{border-color:#E24B4A;border-left:3px solid #A32D2D;background:#FFF8F8}
.div-alert{background:#FCEBEB;border:1px solid #f09595;border-radius:8px;padding:8px 12px;font-size:13px;color:#A32D2D;font-weight:600;margin-top:10px}
.save-bar{position:fixed;bottom:16px;right:16px;background:#4F5053;color:#fff;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;display:none;z-index:999}
.save-bar.vis{display:block}
.err-bar{position:fixed;bottom:16px;right:16px;background:#c0392b;color:#fff;font-size:12px;font-weight:600;padding:8px 16px;border-radius:20px;display:none;z-index:999}
.err-bar.vis{display:block}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-bar select{width:auto;font-size:13px;padding:6px 10px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;background:#F7F7F7;border-bottom:2px solid #e0e0e0;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#626367;font-weight:700;white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:top}
.tbl tr:hover td{background:#FDE8DC22;cursor:pointer}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid #e0e0e0}
.detail-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.detail-item{background:#F7F7F7;border-radius:8px;padding:10px 12px}
.detail-item label{font-size:10px;color:#F15D1B;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.detail-item span{font-size:13px;color:#2D2D2D;font-weight:500;word-break:break-word}
</style>

<script>

  {n:8,lbl:'Confirmar caixa, preparar carta wire e enviar para assinatura',resp:'Opera\u00e7\u00f5es',prazo:'SLA 3 dias \u00fateis'},

  {n:16,lbl:'Avisar administrador do fundo sobre a movimenta\u00e7\u00e3o',resp:'Opera\u00e7\u00f5es',prazo:'Assim que finalizado'},

  {n:1,lbl:'Confirmar com gest\u00e3o o valor do Redemption',resp:'Opera\u00e7\u00f5es',prazo:'D+0'},
  {n:2,lbl:'Confirmar se est\u00e1 no APP TERA',resp:'Opera\u00e7\u00f5es',prazo:'D+0'},
  {n:3,lbl:'Confirmar a janela de resgate com a casa/administrador',resp:'Opera\u00e7\u00f5es',prazo:'D+0'},
  {n:4,lbl:'Solicitar o Redemption Form para a casa/administrador',resp:'Opera\u00e7\u00f5es',prazo:'D+0'},
  {n:5,lbl:'Preencher o Redemption Form e enviar para valida\u00e7\u00e3o da casa/administrador',resp:'Opera\u00e7\u00f5es',prazo:'SLA 3 dias \u00fateis'},
  {n:6,lbl:'Enviar Redemption Form para o Director do fundo assinar (Ver se precisa enviar para RI)',resp:'Opera\u00e7\u00f5es',prazo:'SLA 3 dias \u00fateis'},
  {n:7,lbl:'Enviar para a casa/administrador o documento assinado e confirmar novamente as datas de resgate e cotiza\u00e7\u00e3o',resp:'Opera\u00e7\u00f5es',prazo:'No mesmo dia que recebermos a assinatura'},
  {n:8,lbl:'Efetuar o lan\u00e7amento do Redemption no Addepar e Lote45, se aplic\u00e1vel',resp:'Opera\u00e7\u00f5es',prazo:'Assim que finalizado'},
  {n:9,lbl:'Salvar documento assinado na rede do cliente',resp:'Opera\u00e7\u00f5es',prazo:'Assim que finalizado'},
  {n:10,lbl:'Avisar o administrador do fundo solicitante sobre esse resgate',resp:'Opera\u00e7\u00f5es',prazo:'Assim que finalizado'},
  {n:11,lbl:'Avisar gest\u00e3o',resp:'Opera\u00e7\u00f5es',prazo:'Assim que tiver confirma\u00e7\u00e3o da casa'}
];
// retorna os steps apropriados pra ordem.
// regra: se a ordem ja tem steps salvos, decide pelo tamanho (17=SUB, 11=RED).
// se for nova ordem (sem steps ainda), decide pelo tipo escolhido no form.
function getSteps(o){
  if(o&&o.steps&&o.steps.length===11)return STEPS_RED;
  if(o&&o.steps&&o.steps.length===17)return STEPS_SUB;
  return o&&o.tipo==='Redemption'?STEPS_RED:STEPS_SUB;
}
var ADMINS_DEF=['The Catalyst Group','Apex Group','Alter Domus','Augentius','Aztec Group','BNY Mellon','Carey Olsen','Citi Fund Services','Citco','Conyers','Deutsche Bank','Elysium Fund Management','HedgeServ','HSBC Securities Services','Intertrust Group','IQ EQ','JPMorgan Chase','Mainstream Group','Maples Group','Mourant','NAV Consulting','Northern Trust','Ogier','SEI Investments','SS&C Technologies','State Street','TMF Group','Trident Trust','UBS Fund Services','Vistra','Walkers Fund Services','AQR Capital Management','Anchorage Capital Group','Appaloosa Management','Balyasny Asset Management','Baupost Group','Brevan Howard','Bridgewater Associates','Capula Investment Management','Citadel','Coatue Management','D.E. Shaw','Elliott Management','Glenview Capital Management','Graham Capital Management','Greenlight Capital','Jana Partners','King Street Capital','Lone Pine Capital','Man Group','Marshall Wace','Millennium Management','Pershing Square Capital Management','Point72 Asset Management','Renaissance Technologies','Sculptor Capital Management','Third Point','Tiger Global Management','Two Sigma','Viking Global Investors','Winton Group'];

var S={view:'home',placeholderTitle:'',orders:[],funds:JSON.parse(JSON.stringify(DF_FUNDS)),onshore:[],docs:[],wires:[],cotas:{config:[],entries:{},feriados:[],hiddenDates:[]},cotasView:{startDate:null,filterOwner:'',filterAdm:'',search:''},cotasCell:null,cotasSelected:null,wireDetail:null,wireEdit:null,wireNew:false,wireSearch:'',wireReveal:{},selId:null,showForm:false,focusStep:0,loading:true,filters:{fiv:'',tipo:'',status:''},editId:null,onSearch:'',onDetail:null,onEdit:null,onNew:false,docNew:false,docEdit:null,admNew:false,admSearch:''};

// ─── HELPERS ──────────────────────────────────────────────
function lsLoad(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function showSave(){var b=document.getElementById('save-bar');if(b){b.className='save-bar vis';clearTimeout(_saveTimer);_saveTimer=setTimeout(function(){b.className='save-bar';},2000);}}
function showErr(type){var b=document.getElementById('err-bar');if(b){var lbl=type==='orders'?'ordens':type==='funds'?'fundos':type==='docs'?'documentos':'dados';b.textContent='Erro ao salvar '+lbl+' no servidor (backup local OK)';b.className='err-bar vis';setTimeout(function(){b.className='err-bar';},6000);}}
function showLogin(){document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';var r=document.getElementById('root');if(r)r.innerHTML='<div style="text-align:center;padding:4rem;color:#626367"><div style="font-size:14px;color:#F15D1B;font-weight:600">Carregando...</div></div>';}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function pct(o){return Math.round(o.steps.filter(function(s){return s.done;}).length/o.steps.length*100);}
function ostatus(o){var p=pct(o);return p===100?'Conclu\u00eddo':p===0?'N\u00e3o iniciado':'Em andamento';}
function bcls(o){var p=pct(o);return p===100?'b-ok':p===0?'b-info':'b-warn';}
function fmtV(o){if(!o.valor)return'\u2014';if(o.inKind)return o.valor+' shares';try{return new Intl.NumberFormat('pt-BR',{style:'currency',currency:o.moeda||'USD',maximumFractionDigits:0}).format(o.valor);}catch(e){return o.valor;}}
function fmtNum(v,m){if(!v&&v!==0)return'\u2014';try{return new Intl.NumberFormat('pt-BR',{style:'currency',currency:m||'USD',maximumFractionDigits:0}).format(v);}catch(e){return v;}}
function fmtD(d){if(!d)return null;var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function DL(){return '<datalist id="gest-dl">'+(S.funds.admins||ADMINS_DEF).map(function(g){return '<option value="'+esc(g)+'">';}).join('')+'</datalist>';}
function LOGO(w,h){return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 90 34" xmlns="http://www.w3.org/2000/svg"><text x="0" y="30" font-family="Arial,sans-serif" font-size="34" font-weight="700" fill="#4F5053">TER</text><text x="61" y="30" font-family="Arial,sans-serif" font-size="34" font-weight="700" fill="#F15D1B">A</text></svg>';}
function wireStatus(o){
  if(!o.wire)return null;
  if(o.tipo==='Redemption')return null;
  var today=new Date();today.setHours(0,0,0,0);
  var wd=new Date(o.wire+'T00:00:00');
  var diff=Math.round((wd-today)/(1000*60*60*24));
  if(diff<0)return{cls:'wire-overdue',badge:'b-red',lbl:'Wire vencida'};
  if(diff===0)return{cls:'wire-urgent',badge:'b-red',lbl:'Wire hoje'};
  if(diff===1)return{cls:'wire-urgent',badge:'b-ora',lbl:'Wire amanh\u00e3'};
  if(diff===2)return{cls:'wire-urgent',badge:'b-ora',lbl:'Wire em 2 dias'};
  return{cls:'',badge:'b-info',lbl:'Wire: '+fmtD(o.wire)};
}
function hasDivergence(o){if(!o.valorConfirmado&&o.valorConfirmado!==0)return false;return parseFloat(o.valorConfirmado)!==parseFloat(o.valor);}

document.getElementById('login-btn').onclick=function(){
  var u=(document.getElementById('l-user').value||'').trim();
  var p=(document.getElementById('l-pass').value||'').trim();
  var btn=document.getElementById('login-btn');
  document.getElementById('login-err').style.display='none';
  if(!u||!p){document.getElementById('login-err').style.display='block';return;}
  btn.textContent='Entrando...';btn.disabled=true;
  fetch(SCRIPT_URL+'?action=login&user='+encodeURIComponent(u)+'&pass='+encodeURIComponent(p)+'&t='+Date.now())
    .then(function(r){return r.text();})
    .then(function(txt){
      var d=JSON.parse(txt);
      if(d.success){currentUser=d.name;_token=d.token;lsSave('sd_session',{user:currentUser,token:_token,ts:Date.now()});showApp();btn.textContent='Entrar \u2192';btn.disabled=false;init();}
      else if(d.error==='locked'){var eEl=document.getElementById('login-err');eEl.innerHTML=d.msg||'Muitas tentativas. Tente novamente em 1 hora.';eEl.style.display='block';document.getElementById('l-pass').value='';btn.textContent='Entrar \u2192';btn.disabled=false;}
      else{document.getElementById('login-err').innerHTML='Usu\u00e1rio ou senha incorretos.';document.getElementById('login-err').style.display='block';document.getElementById('l-pass').value='';btn.textContent='Entrar \u2192';btn.disabled=false;}
    })
    .catch(function(){document.getElementById('login-err').innerHTML='Erro de conex\u00e3o.';document.getElementById('login-err').style.display='block';btn.textContent='Entrar \u2192';btn.disabled=false;});
};

  lsSave('sd_session',null);currentUser=null;_token=null;

}

function init(){
  S.loading=true;
  if(_refreshTimer){clearInterval(_refreshTimer);_refreshTimer=null;}
  fetch(SCRIPT_URL+'?action=getData&token='+encodeURIComponent(_token||'')+'&t='+Date.now())
    .then(function(r){return r.text();})
    .then(function(txt){
      try{var d=JSON.parse(txt);
        if(d.error==='unauthorized'){logout();return;}
        S.orders=d.orders||[];S.funds=d.funds||JSON.parse(JSON.stringify(DF_FUNDS));if(!S.funds.admins||S.funds.admins.length===0)S.funds.admins=ADMINS_DEF.slice();S.onshore=d.onshore&&d.onshore.length?d.onshore:ON_DEFAULT.slice();S.docs=d.docs||[];S.wires=d.wires||[];S.cotas=d.cotas||{config:[],entries:{},feriados:[],hiddenDates:[]};if(!S.cotas.config)S.cotas.config=[];if(!S.cotas.entries)S.cotas.entries={};if(!S.cotas.feriados)S.cotas.feriados=[];if(!S.cotas.hiddenDates)S.cotas.hiddenDates=[];}
      catch(e){S.orders=lsLoad('sd_orders')||[];S.funds=lsLoad('sd_funds')||JSON.parse(JSON.stringify(DF_FUNDS));if(!S.funds.admins||!S.funds.admins.length)S.funds.admins=ADMINS_DEF.slice();S.onshore=lsLoad('sd_onshore')||ON_DEFAULT.slice();S.docs=lsLoad('sd_docs')||[];S.wires=lsLoad('sd_wires')||[];S.cotas=lsLoad('sd_cotas')||{config:[],entries:{},feriados:[],hiddenDates:[]};if(!S.cotas.hiddenDates)S.cotas.hiddenDates=[];}
      S.loading=false;R();_refreshTimer=setInterval(autoRefresh,2000);
    })
    .catch(function(){      S.orders=lsLoad('sd_orders')||[];S.funds=lsLoad('sd_funds')||JSON.parse(JSON.stringify(DF_FUNDS));S.onshore=lsLoad('sd_onshore')||ON_DEFAULT.slice();S.docs=lsLoad('sd_docs')||[];S.wires=lsLoad('sd_wires')||[];S.cotas=lsLoad('sd_cotas')||{config:[],entries:{},feriados:[],hiddenDates:[]};if(!S.cotas.hiddenDates)S.cotas.hiddenDates=[];S.loading=false;R();_refreshTimer=setInterval(autoRefresh,2000);});
}
function autoRefresh(){
  if(S.showForm||S.editId||S.onNew||S.onEdit!==null||S.view==='home'||S.view==='placeholder'||S.view==='cotas'||S.view==='onshore'||S.view==='docs'||S.view==='email'||S.view==='detail'||S.view==='funds'||S.view==='orders'||S.view==='wires'||S.view==='insights'||S.docNew||S.docEdit!==null||S.wireNew||S.wireEdit!==null||S.wireDetail||S.cotasCell)return;
  fetch(SCRIPT_URL+'?action=getData&token='+encodeURIComponent(_token||'')+'&t='+Date.now())
    .then(function(r){return r.text();})
    .then(function(txt){
      try{var d=JSON.parse(txt);
        if(d.error==='unauthorized'){logout();return;}
        var no=JSON.stringify(d.orders||[]);var nf=JSON.stringify(d.funds||{});var non=JSON.stringify(d.onshore||[]);var nw=JSON.stringify(d.wires||[]);
      if(no!==JSON.stringify(S.orders)||nf!==JSON.stringify(S.funds)||non!==JSON.stringify(S.onshore)||nw!==JSON.stringify(S.wires)){S.orders=d.orders||[];S.funds=d.funds||JSON.parse(JSON.stringify(DF_FUNDS));if(d.onshore&&d.onshore.length)S.onshore=d.onshore;S.wires=d.wires||[];R();}}catch(e){}
    }).catch(function(){});
}
function syncToSheet(type,data,attempt){
  attempt=attempt||0;
  var body=JSON.stringify({token:_token||'',type:type,data:JSON.stringify(data)});
  fetch(SCRIPT_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:body
  }).catch(function(err){
    if(attempt<2){setTimeout(function(){syncToSheet(type,data,attempt+1);},800*(attempt+1));return;}
    console.error('[syncToSheet] falha apos 3 tentativas. type='+type+' erro=',err);
    showErr(type);
  });
}

    if(d.cat==='Wire Instructions'||d.cat==='Cotas Onshore'){
      d.cat='Manuais';
      migrated=true;
    }
  });
  if(migrated)saveDocs();
  var cats=['Manuais','Regulamentos Onshore','PPM/Offering Memorandum/AoA'];

  h+='<h1 style="font-size:26px;font-weight:700;color:#2D2D2D">Documentos</h1></div>';
  h+='<button class="btn p" onclick="docNewOpen()">+ Adicionar documento</button></div>';

    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #F15D1B">';
    h+='<h2 style="font-size:17px;font-weight:700;color:#2D2D2D">'+cat+'</h2>';
    h+='<span style="font-size:12px;color:#888;font-weight:400">('+docs.length+')</span></div>';
    if(docs.length===0){
      h+='<div style="color:#888;font-size:13px;padding:12px 0">Nenhum documento nesta categoria ainda.</div>';
    }else{
      h+='<div style="display:flex;flex-direction:column;gap:8px">';
      for(var i=0;i<docs.length;i++){
        var d=docs[i];var realIdx=S.docs.indexOf(d);

        h+='<div class="card" style="display:flex;align-items:center;gap:12px">';
        h+='<div style="font-size:24px;color:#626367">&#128196;</div>';
        h+='<div style="flex:1"><div style="font-weight:600;font-size:14px;color:#2D2D2D">'+esc(d.nome)+'</div>';
        h+='<div style="font-size:12px;color:#626367;margin-top:2px">'+esc(d.desc||'')+'</div></div>';

        h+='<button class="btn sm" onclick="docEditOpen('+realIdx+')" style="font-size:14px">&#9998;</button>';
        h+='<button class="btn sm dr" onclick="docDel('+realIdx+')">&#10005;</button></div></div>';
      }
      h+='</div>';
    }
    h+='</div>';
  }
  return h;
}

function docIcon(nome){
  if(!nome)return'&#128196;';
  var n=(nome||'').toLowerCase();
  if(n.indexOf('.xlsx')>=0||n.indexOf('.xls')>=0)return'&#129001;';
  if(n.indexOf('.docx')>=0||n.indexOf('.doc')>=0)return'&#128203;';
  if(n.indexOf('.pdf')>=0)return'&#128196;';
  return'&#128196;';
}

function enviarEmail(){
  var DEST=[
    {nome:'Felipe Ferreira', email:'felipe.ferreira@teracapital.com.br'},
    {nome:'Paulo Parisi',    email:'paulo.parisi@teracapital.com.br'},
    {nome:'Vitor Fran\u00e7a',    email:'vitor.franca@teracapital.com.br'}
  ];
  var tos=[];
  for(var i=0;i<DEST.length;i++){
    var cb=document.getElementById('em-to-'+i);
    if(cb&&cb.checked)tos.push(DEST[i].email);
  }
  if(tos.length===0){alert('Selecione ao menos um destinat\u00e1rio.');return;}
  var subj=(document.getElementById('em-subj').value||'').trim();
  var body=(document.getElementById('em-body').value||'').trim();
  if(!subj){alert('Preencha o assunto.');return;}
  var mailto='mailto:'+tos.join(',')+
    '?subject='+encodeURIComponent(subj)+
    '&body='+encodeURIComponent(body);
  window.location.href=mailto;
}

function R(){
  var root=document.getElementById('root');if(!root)return;
  if(S.loading){root.innerHTML='<div style="text-align:center;padding:4rem;color:#626367"><div style="font-size:14px;color:#F15D1B;font-weight:600">Carregando dados...</div></div>';return;}

      // salva scroll de containers antes de renderizar
    var scrollPositions={};
    var scrollEls=document.querySelectorAll('[data-scroll-id]');
    for(var si=0;si<scrollEls.length;si++){scrollPositions[scrollEls[si].getAttribute('data-scroll-id')]=scrollEls[si].scrollTop;}

    // salva foco antes de renderizar
  var focusId=document.activeElement?document.activeElement.id:null;
  var focusSel=document.activeElement&&document.activeElement.selectionStart!==undefined?document.activeElement.selectionStart:null;

  try{
    // mapeamento view -> label do breadcrumb
    var viewLabels={
      home:'Atividades',
      orders:'SubDocs',detail:'SubDocs',
      onshore:'Ve\u00edculos Internos',
      funds:'Investidos e Investidores',
      docs:'Manuais',
      email:'E-mail',
      wires:'Wire Instructions',
      cotas:'Cotas',
      insights:'Insights',
      placeholder:S.placeholderTitle||'Em desenvolvimento'
    };
    var crumb=S.view==='home'?'Dashboard de Opera\u00e7\u00f5es':'<a onclick="go(\'home\')" style="color:#F15D1B;cursor:pointer;text-decoration:none">Dashboard de Opera\u00e7\u00f5es</a> <span style="color:#C5C0BB;margin:0 12px">\u203a</span> <span style="color:#2D2D2D">'+esc(viewLabels[S.view]||S.view)+'</span>';
    var h='<div class="nav"><span style="cursor:pointer;display:flex;align-items:center" onclick="go(\'home\')" title="Voltar ao in\u00edcio">'+LOGO(56,22)+'</span>';
    h+='<div style="font-size:16px;font-weight:500;margin-left:10px;display:flex;align-items:center;line-height:1">'+crumb+'</div>';
    var emailBtn=S.view==='email'?'':'<button onclick="go(\'email\')" style="background:#FCE5D4;border:1px solid #F8C9A6;color:#7A3C10;padding:5px 12px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s ease" onmouseover="this.style.background=\'#F8C9A6\'" onmouseout="this.style.background=\'#FCE5D4\'">E-mail</button>';
    h+='<div style="margin-left:auto;display:flex;align-items:center;gap:10px">'+emailBtn+'<span style="font-size:13px;color:#626367">'+esc(currentUser||'')+'</span><button class="btn sm dr" onclick="logout()">Sair</button></div></div>';
    if(S.view==='home')h+=vHome();
    else{
      var inner='';
      if(S.view==='orders')inner=vOrders();
      else if(S.view==='detail')inner=vDetail();
      else if(S.view==='onshore')inner=vOnshore();
      else if(S.view==='email')inner=vEmail();
      else if(S.view==='docs')inner=vDocs();
      else if(S.view==='wires')inner=vWires();
      else if(S.view==='cotas')inner=vCotas();
      else if(S.view==='insights')inner=vInsights();
      else if(S.view==='placeholder')inner=vPlaceholder();
      else if(S.view==='funds')inner=vFunds();
      else inner=vHome();
      var cls=(S.view!==_lastView)?'page-enter':'';
      h+='<div class="'+cls+'">'+inner+'</div>';
    }
    _lastView=S.view;
    root.innerHTML=h;

    // restaura foco
    if(focusId){
      var el=document.getElementById(focusId);
      if(el){
        el.focus();
        if(focusSel!==null&&el.setSelectionRange){
          try{el.setSelectionRange(focusSel,focusSel);}catch(e){}
        }
      }
    }
    // restaura scroll
    var scrollElsAfter=document.querySelectorAll('[data-scroll-id]');

// feriados conhecidos (Sexta-feira Santa, Tiradentes). Usuario pode adicionar mais.
var COTAS_FERIADOS_SEED=['2026-04-03','2026-04-21','2026-05-01'];

// retorna uma Date com horario de Brasilia (sao paulo) — usado pra "hoje"
// independente do fuso do navegador.
function cotasNowBR(){
  var brStr=new Date().toLocaleString('en-US',{timeZone:'America/Sao_Paulo'});
  return new Date(brStr);
}
function cotasTodayBR(){
  var n=cotasNowBR();
  return new Date(n.getFullYear(),n.getMonth(),n.getDate());
}

// classifica uma string em cor com base no conteudo.
// gray = SOMENTE pra string vazia. Se tem qualquer texto, retorna green/yellow/red.
function cotasInferColor(text){
  if(!text)return'gray';
  var t=text.trim().toLowerCase();
  if(!t)return'gray';
  if(t.indexOf('pendente')===0)return'red';
  if(t.indexOf('verificar')>=0||t.indexOf('checar')>=0||t.indexOf('cobrar')>=0||t.indexOf('cobrei')>=0)return'yellow';
  return'green';
}

function cotasInit(){
  // primeira vez (config vazia): popula tudo do zero
  if(!S.cotas.config||S.cotas.config.length===0){
    S.cotas.config=COTAS_SEED.map(function(c){return{id:uid(),fundo:c.fundo,codigo:c.codigo,adm:c.adm,owner:c.owner};});
    var byName={};S.cotas.config.forEach(function(c){byName[c.fundo]=c.id;});
    Object.keys(COTAS_HIST).forEach(function(name){
      var id=byName[name];if(!id)return;
      var hist=COTAS_HIST[name];
      Object.keys(hist).forEach(function(iso){
        var txt=hist[iso];
        S.cotas.entries[id+'|'+iso]={t:txt,c:cotasInferColor(txt)};
      });
    });
    if(!S.cotas.feriados||S.cotas.feriados.length===0){
      S.cotas.feriados=COTAS_FERIADOS_SEED.slice();
    }
    saveCotas();
    return;
  }
  // ja existe config: faz migracao aditiva (nao sobrescreve nada)
  var changed=false;
  // (a) MIGRACAO: remove CORAL (fundo encerrado)
  var coralIdx=-1;
  for(var ci=0;ci<S.cotas.config.length;ci++){
    if(S.cotas.config[ci].fundo==='CORAL'){coralIdx=ci;break;}
  }
  if(coralIdx>=0){
    var coralId=S.cotas.config[coralIdx].id;
    S.cotas.config.splice(coralIdx,1);
    // remove entries do CORAL
    Object.keys(S.cotas.entries).forEach(function(k){
      if(k.indexOf(coralId+'|')===0)delete S.cotas.entries[k];
    });
    changed=true;
  }
  // (b) adiciona fundos do seed que ainda nao estao na config
  var existingNames={};S.cotas.config.forEach(function(c){existingNames[c.fundo]=true;});
  COTAS_SEED.forEach(function(seed){
    if(!existingNames[seed.fundo]){
      S.cotas.config.push({id:uid(),fundo:seed.fundo,codigo:seed.codigo,adm:seed.adm,owner:seed.owner});
      changed=true;
    }
  });
  // (c) backfill de entries historicos APENAS pra chaves que nao existem
  var nameToId={};S.cotas.config.forEach(function(c){nameToId[c.fundo]=c.id;});
  Object.keys(COTAS_HIST).forEach(function(name){
    var id=nameToId[name];if(!id)return;
    var hist=COTAS_HIST[name];
    Object.keys(hist).forEach(function(iso){
      var k=id+'|'+iso;
      if(!S.cotas.entries[k]){
        var txt=hist[iso];
        S.cotas.entries[k]={t:txt,c:cotasInferColor(txt)};
        changed=true;
      }
    });
  });
  // (d) adiciona feriados conhecidos que faltam
  if(!S.cotas.feriados)S.cotas.feriados=[];
  COTAS_FERIADOS_SEED.forEach(function(f){
    if(S.cotas.feriados.indexOf(f)<0){S.cotas.feriados.push(f);changed=true;}
  });
  // (e) MIGRACAO: re-classifica entries com "cobrei" que estao verdes -> amarelo
  Object.keys(S.cotas.entries).forEach(function(k){
    var e=S.cotas.entries[k];
    if(!e||!e.t)return;
    var txt=e.t.trim().toLowerCase();
    if(e.c==='green'&&(txt.indexOf('cobrei')>=0||txt.indexOf('cobrar')>=0)){
      e.c='yellow';
      changed=true;
    }
  });
  if(changed)saveCotas();
}

function cotasFmtDate(d){
  // d = Date object -> "DD/MM"
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
}
function cotasIso(d){
  // d = Date object -> "YYYY-MM-DD"
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function cotasParseIso(s){
  var p=s.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
}
function cotasIsBusinessDay(d){
  var w=d.getDay();
  if(w===0||w===6)return false; // domingo, sabado
  var iso=cotasIso(d);
  if(S.cotas.feriados&&S.cotas.feriados.indexOf(iso)>=0)return false;
  return true;
}
function cotasGetBusinessDays(weeks){
  // retorna array de datas: ultimos N semanas + 1 dia util a frente, so dias uteis,
  // em ordem cronologica crescente. weeks=4 -> ~20 dias uteis no passado + 1 dia util futuro.
  var anchor=S.cotasView.startDate?cotasParseIso(S.cotasView.startDate):cotasTodayBR();
  anchor=new Date(anchor.getFullYear(),anchor.getMonth(),anchor.getDate());
  var begin=new Date(anchor);begin.setDate(begin.getDate()-(weeks*7-1));
  // calcula 1 dia util apos o anchor
  var futureCursor=new Date(anchor);
  futureCursor.setDate(futureCursor.getDate()+1);
  while(!cotasIsBusinessDay(futureCursor)){
    futureCursor.setDate(futureCursor.getDate()+1);
    // safety: nao loopa mais que 14 dias
    if((futureCursor-anchor)/(86400000)>14)break;
  }
  var end=futureCursor;
  var out=[];
  var cursor=new Date(begin);
  while(cursor<=end){
    if(cotasIsBusinessDay(cursor))out.push(new Date(cursor));
    cursor.setDate(cursor.getDate()+1);
  }
  return out;
}
// retorna o ultimo dia util ate hoje (inclusive hoje se for util).
// usado pra destacar a coluna "atual" mesmo quando hoje eh fim de semana ou feriado.
function cotasLastBusinessDay(){
  var d=cotasTodayBR();
  for(var i=0;i<14;i++){
    if(cotasIsBusinessDay(d))return d;
    d.setDate(d.getDate()-1);
  }
  return cotasTodayBR();
}

// verifica se uma coluna (data) eh elegivel para ser escondida.
// regra: SO permite esconder se TODAS as celulas com conteudo daquela data
// estao verdes E o texto contem "ok" (com ou sem outras informacoes).
// celulas vazias nao impedem.
// retorna {eligible:bool, total:int, reason:string} para feedback ao user.
function cotasColumnEligibleToHide(iso){
  var fundos=S.cotas.config;
  var total=0,nonGreen=0,noOk=0;
  for(var i=0;i<fundos.length;i++){
    var entry=cotasGetEntry(fundos[i].id,iso);
    if(!entry||!entry.t||!entry.t.trim())continue; // vazias nao contam
    total++;
    if(entry.c!=='green'){nonGreen++;continue;}
    var t=entry.t.trim().toLowerCase();
    if(t.indexOf('ok')<0)noOk++;
  }
  if(total===0)return{eligible:false,total:0,reason:'Coluna vazia'};
  if(nonGreen>0)return{eligible:false,total:total,reason:nonGreen+' c\u00e9lula(s) n\u00e3o-verde(s)'};
  if(noOk>0)return{eligible:false,total:total,reason:noOk+' c\u00e9lula(s) sem "ok"'};
  return{eligible:true,total:total,reason:''};
}

function cotasHideColumn(iso){
  var info=cotasColumnEligibleToHide(iso);
  if(!info.eligible){
    alert('N\u00e3o \u00e9 poss\u00edvel ocultar esta coluna:\n\n'+info.reason+'\n\nApenas colunas onde todas as c\u00e9lulas est\u00e3o verdes e cont\u00eam "ok" podem ser ocultadas.');
    return;
  }
  var d=cotasParseIso(iso);
  var dateStr=cotasFmtDate(d)+'/'+iso.split('-')[0];
  if(!confirm('Tem certeza que deseja ocultar a coluna do dia '+dateStr+'?\n\nOs dados continuam salvos e voc\u00ea pode trazer a coluna de volta a qualquer momento.'))return;
  if(!S.cotas.hiddenDates)S.cotas.hiddenDates=[];
  if(S.cotas.hiddenDates.indexOf(iso)<0)S.cotas.hiddenDates.push(iso);
  saveCotas();R();
}

function cotasRestoreColumn(iso){
  if(!S.cotas.hiddenDates)return;
  S.cotas.hiddenDates=S.cotas.hiddenDates.filter(function(x){return x!==iso;});
  saveCotas();R();
}

function cotasManageHidden(){
  var hidden=(S.cotas.hiddenDates||[]).slice().sort();
  if(hidden.length===0){
    alert('Nenhuma coluna oculta no momento.');
    return;
  }
  var dateStrs=hidden.map(function(iso){return cotasFmtDate(cotasParseIso(iso))+'/'+iso.split('-')[0];});
  var msg='Colunas ocultas atualmente:\n\n'+dateStrs.map(function(d,i){return(i+1)+') '+d;}).join('\n')+'\n\nDigite o n\u00famero da coluna que deseja restaurar (ou cancele):';
  var input=prompt(msg);
  if(input===null)return;
  var n=parseInt(input);
  if(isNaN(n)||n<1||n>hidden.length){alert('N\u00famero inv\u00e1lido.');return;}
  cotasRestoreColumn(hidden[n-1]);
}

// listener global pra teclas Delete/Backspace/Esc/Ctrl+C/Ctrl+V/Setas na view de Cotas
(function(){
  document.addEventListener('keydown',function(e){
    if(S.view!=='cotas')return;
    if(S.cotasCell)return; // editor aberto: nao interfere
    var tag=(e.target.tagName||'').toLowerCase();
    if(tag==='input'||tag==='textarea'||tag==='select')return;
    var ctrl=e.ctrlKey||e.metaKey;
    // Ctrl/Cmd + C — copia
    if(ctrl&&(e.key==='c'||e.key==='C')){
      if(S.cotasSelected&&S.cotasSelected.length>0){
        e.preventDefault();
        cotasCopySelected();
      }
      return;
    }
    // Ctrl/Cmd + V — cola
    if(ctrl&&(e.key==='v'||e.key==='V')){
      if(S.cotasSelected&&S.cotasSelected.length>0&&_cotasClipboard){
        e.preventDefault();
        cotasPasteSelected();
      }
      return;
    }
    // Setas — navegacao estilo Excel (so quando exatamente 1 celula selecionada)
    if(S.cotasSelected&&S.cotasSelected.length===1){
      var arrow={'ArrowRight':[0,1],'ArrowLeft':[0,-1],'ArrowDown':[1,0],'ArrowUp':[-1,0]}[e.key];
      if(arrow){
        e.preventDefault();
        cotasNavArrow(arrow[0],arrow[1]);
        return;
      }
      // Enter abre o editor da celula selecionada
      if(e.key==='Enter'){
        e.preventDefault();
        var parts=S.cotasSelected[0].split('|');
        cotasOpenCell(parts[0],parts[1]);
        return;
      }
    }
    if(!S.cotasSelected||S.cotasSelected.length===0)return;
    if(e.key==='Delete'||e.key==='Backspace'){
      e.preventDefault();
      cotasClearSelected();
    }else if(e.key==='Escape'){
      e.preventDefault();
      cotasClearSelection();
    }
  });
})();

// move a selecao 1 celula em determinada direcao (rowDelta, colDelta).
// rowDelta = +1 desce 1 linha, -1 sobe 1 linha
// colDelta = +1 vai pra direita, -1 vai pra esquerda
// respeita filtros e datas escondidas. nao "wrap-around" — para nas bordas.
function cotasNavArrow(rowDelta,colDelta){
  if(!S.cotasSelected||S.cotasSelected.length!==1)return;
  var current=S.cotasSelected[0];
  var parts=current.split('|');
  var fundoIdAtual=parts[0];
  var isoAtual=parts[1];
  // monta lista de fundos visiveis (mesmos filtros que a vCotas usa)
  var fundos=S.cotas.config.slice();
  var fOwner=S.cotasView.filterOwner||'';
  var fAdm=S.cotasView.filterAdm||'';
  var fSearch=(S.cotasView.search||'').toLowerCase();
  if(fOwner)fundos=fundos.filter(function(f){return f.owner===fOwner;});
  if(fAdm)fundos=fundos.filter(function(f){return f.adm===fAdm;});
  if(fSearch)fundos=fundos.filter(function(f){return(f.fundo||'').toLowerCase().indexOf(fSearch)>=0||(f.codigo||'').toLowerCase().indexOf(fSearch)>=0;});
  // monta lista de datas visiveis
  var dates=cotasGetBusinessDays(4);
  var hidden=S.cotas.hiddenDates||[];
  if(hidden.length>0)dates=dates.filter(function(d){return hidden.indexOf(cotasIso(d))<0;});
  // acha indice atual
  var rIdx=-1;for(var i=0;i<fundos.length;i++)if(fundos[i].id===fundoIdAtual){rIdx=i;break;}
  var cIdx=-1;for(var j=0;j<dates.length;j++)if(cotasIso(dates[j])===isoAtual){cIdx=j;break;}
  if(rIdx<0||cIdx<0)return; // celula atual nao esta visivel (filtro mudou)
  // calcula nova posicao
  var nr=rIdx+rowDelta;
  var nc=cIdx+colDelta;
  // bordas: para sem wrap
  if(nr<0||nr>=fundos.length||nc<0||nc>=dates.length)return;
  // troca selecao (substitui o anterior)
  var newKey=fundos[nr].id+'|'+cotasIso(dates[nc]);
  S.cotasSelected=[newKey];
  cotasUpdateCellVisual(current);
  cotasUpdateCellVisual(newKey);
  // garante que a celula nova esta visivel no scroll horizontal
  var el=document.querySelector('[data-cellkey="'+newKey+'"]');
  if(el&&el.scrollIntoView){
    // scroll suave horizontal sem afetar scroll vertical
    var sc=document.getElementById('cotas-scroll');
    if(sc){
      var elRect=el.getBoundingClientRect();
      var scRect=sc.getBoundingClientRect();
      // se ta cortada na direita
      if(elRect.right>scRect.right-20){
        sc.scrollLeft+=(elRect.right-scRect.right+40);
      }else if(elRect.left<scRect.left+180){
        // se ta cortada na esquerda (180 = espaco aproximado das colunas fixas)
        sc.scrollLeft-=(scRect.left+180-elRect.left+10);
      }
    }
  }
}

    });
  }

  h+='</tbody></table></div>';

  // legenda
  h+='<div style="display:flex;gap:14px;margin-top:10px;font-size:11px;color:#626367;flex-wrap:wrap">';

  h+='<span><span style="display:inline-block;width:12px;height:12px;background:#FFF3CD;border:1px solid #FFE69C;border-radius:2px;vertical-align:middle"></span> Aten\u00e7\u00e3o</span>';
  h+='<span><span style="display:inline-block;width:12px;height:12px;background:#F8D7DA;border:1px solid #F1B0B7;border-radius:2px;vertical-align:middle"></span> Pend\u00eancia</span>';
  h+='<span><span style="display:inline-block;width:12px;height:12px;background:#F0EEEC;border:1px solid #DDD8D2;border-radius:2px;vertical-align:middle"></span> Em branco</span>';
  h+='<span style="margin-left:auto">Clique numa c\u00e9lula para editar</span>';
  h+='</div>';

  h+='</div>';

  // post-render: scroll automatico ate "hoje" e drag horizontal
  setTimeout(cotasSetupScroll,30);

  return h;
}
function cotasSetupScroll(forceScrollToToday){
  var sc=document.getElementById('cotas-scroll');
  if(!sc)return;
  // preserva scroll atual se ja foi inicializado e nao foi forcado
  var preserveScroll=sc._scrollInitialized&&!forceScrollToToday;
  var savedScrollLeft=preserveScroll?sc.scrollLeft:null;
  // 1) scroll automatico ate o "hoje" (ou ultimo dia util) — somente na 1a vez ou se forcado
  if(!preserveScroll){
    var todayIso=cotasIso(cotasTodayBR());
    var lastBizIso=cotasIso(cotasLastBusinessDay());
    var ths=sc.querySelectorAll('th[data-date]');
    var targetTh=null;
    for(var i=0;i<ths.length;i++){
      var d=ths[i].getAttribute('data-date');
      if(d===todayIso){targetTh=ths[i];break;}
      if(d===lastBizIso&&!targetTh)targetTh=ths[i];
    }
    if(targetTh){
      var thLeft=targetTh.offsetLeft;
      var visible=sc.clientWidth;
      sc.scrollLeft=Math.max(0,thLeft-visible*0.7);
    }
    sc._scrollInitialized=true;
  }else{
    // re-render mantendo posicao: restaura scroll exatamente onde estava
    sc.scrollLeft=savedScrollLeft;
  }
  // 2) drag-to-scroll horizontal (clicar e arrastar, mas nao na area das celulas/linhas)
  if(sc._dragInited)return;
  sc._dragInited=true;
  var isDown=false,startX=0,scrollLeft=0,moved=false;
  sc.addEventListener('mousedown',function(e){
    // ignora clique em celula/botao/textarea (deixa o click normal funcionar)
    if(e.target.closest('[onclick],button,input,textarea,select'))return;
    isDown=true;moved=false;
    sc.style.cursor='grabbing';
    startX=e.pageX-sc.offsetLeft;
    scrollLeft=sc.scrollLeft;
  });
  sc.addEventListener('mouseleave',function(){if(isDown){isDown=false;sc.style.cursor='';}});
  sc.addEventListener('mouseup',function(){if(isDown){isDown=false;sc.style.cursor='';}});
  sc.addEventListener('mousemove',function(e){
    if(!isDown)return;
    e.preventDefault();
    var x=e.pageX-sc.offsetLeft;
    var walk=(x-startX);
    if(Math.abs(walk)>3)moved=true;
    sc.scrollLeft=scrollLeft-walk;
  });
  // se moveu durante o drag, cancela cliques (evita abrir editor por engano)
  sc.addEventListener('click',function(e){
    if(moved){e.stopPropagation();e.preventDefault();moved=false;}
  },true);
}

// atualiza visualmente uma celula no DOM sem re-renderizar a tabela inteira.
// chamado quando seleciona/desseleciona pra evitar piscar.
function cotasUpdateCellVisual(cellKey){
  var sel=S.cotasSelected||[];
  var isSel=sel.indexOf(cellKey)>=0;
  // procura o div da celula pelo data-cellkey
  var el=document.querySelector('[data-cellkey="'+cellKey+'"]');
  if(!el)return;
  if(isSel){el.style.boxShadow='0 0 0 2px #F15D1B inset';}
  else{el.style.boxShadow='';}
}

// re-renderiza o conteudo + cor de uma celula sem mexer no resto da tabela
function cotasUpdateCellContent(cellKey){
  var el=document.querySelector('[data-cellkey="'+cellKey+'"]');
  if(!el)return;
  var parts=cellKey.split('|');
  var fundoId=parts[0];var iso=parts[1];
  var entry=cotasGetEntry(fundoId,iso);
  var bg=entry?cotasColorBg(entry.c):'transparent';
  var fg=entry?cotasColorText(entry.c):'#9A958F';
  var bd=entry?cotasColorBorder(entry.c):'#EAE7E3';
  var label=entry?(entry.t||(entry.c==='green'?'ok':entry.c==='yellow'?'!':entry.c==='red'?'X':'')):'';
  el.style.background=bg;
  el.style.color=fg;
  el.style.borderColor=bd;
  if(entry&&entry.t)el.setAttribute('title',entry.t);
  else el.removeAttribute('title');
  el.textContent=label.length>14?label.substring(0,12)+'\u2026':label;
  // re-aplica boxShadow se ainda esta selecionada
  cotasUpdateCellVisual(cellKey);
}

// handler de clique simples em celula: SELECIONA (sem abrir editor)
// - sem Ctrl: substitui selecao atual por essa celula
// - com Ctrl/Cmd: adiciona/remove dessa celula da selecao
function cotasCellClick(e,fundoId,iso){
  e.stopPropagation();
  var cellKey=fundoId+'|'+iso;
  if(e.ctrlKey||e.metaKey){
    // toggle multi-select
    if(!S.cotasSelected)S.cotasSelected=[];
    var idx=S.cotasSelected.indexOf(cellKey);
    if(idx>=0){
      S.cotasSelected.splice(idx,1);
      if(S.cotasSelected.length===0)S.cotasSelected=null;
      cotasUpdateCellVisual(cellKey);
    }else{
      S.cotasSelected.push(cellKey);
      cotasUpdateCellVisual(cellKey);
    }
    cotasUpdateSelectionBar();
    return;
  }
  // clique simples: substitui selecao atual por apenas essa celula
  var prev=(S.cotasSelected||[]).slice();
  S.cotasSelected=[cellKey];
  // limpa visual das anteriores que nao estao mais selecionadas
  prev.forEach(function(k){if(k!==cellKey)cotasUpdateCellVisual(k);});
  cotasUpdateCellVisual(cellKey);
  cotasUpdateSelectionBar();
}

// handler de duplo-clique: ABRE editor
function cotasCellDblClick(e,fundoId,iso){
  e.stopPropagation();
  if(S.cotasSelected){

    S.cotasSelected=null;

// COLA o conteudo do clipboard interno nas celulas atualmente selecionadas.
// regras:
//  - 1 origem -> N destino: replica a origem em todas as N
//  - N origem -> N destino (mesmo tamanho): cola na ordem
//  - outros casos: cola so a 1a origem em todas
function cotasPasteSelected(){
  var sel=S.cotasSelected;
  if(!sel||sel.length===0)return false;
  if(!_cotasClipboard||_cotasClipboard.length===0)return false;
  var src=_cotasClipboard;
  var keys=sel.slice();
  keys.forEach(function(destKey,i){
    var srcEntry;
    if(src.length===keys.length){srcEntry=src[i];}
    else{srcEntry=src[0];}
    if(!srcEntry||!srcEntry.t){
      delete S.cotas.entries[destKey];
    }else{
      S.cotas.entries[destKey]={t:srcEntry.t,c:srcEntry.c};
    }
  });
  saveCotas();
  // atualiza so as celulas coladas (sem re-render global, sem piscar)
  keys.forEach(cotasUpdateCellContent);
  return true;
}

function cotasSaveCell(){
  var c=S.cotasCell;if(!c)return;
  var t=document.getElementById('cota-cell-text');
  var texto=t?t.value:'';
  var cellKey=cotasEntryKey(c.fundoId,c.iso);
  // se nao tem texto, apaga a entrada (celula em branco)
  if(!texto.trim()){
    delete S.cotas.entries[cellKey];
    saveCotas();
    S.cotasCell=null;
    cotasRenderOverlay();
    cotasUpdateCellContent(cellKey);
    return;
  }
  // tem texto: cor obrigatoriamente verde/amarelo/vermelho (nunca gray)
  var cor=c.cor||(cotasGetEntry(c.fundoId,c.iso)||{}).c||cotasInferColor(texto);
  if(cor==='gray')cor=cotasInferColor(texto);
  if(['green','yellow','red'].indexOf(cor)<0)cor='green';
  cotasSetEntry(c.fundoId,c.iso,texto,cor);
  S.cotasCell=null;
  cotasRenderOverlay();
  // atualiza so a celula salva — sem re-render global, sem piscar
  cotasUpdateCellContent(cellKey);
}

// ─── INSIGHTS ─────────────────────────────────────────────
function vInsights(){
  var orders=S.orders||[];
  var now=Date.now();
  var DAY=86400000;

  // helpers
  function fmtUSD(n){return n.toLocaleString('en-US',{maximumFractionDigits:0});}
  function pctNum(o){return Math.round(o.steps.filter(function(s){return s.done;}).length/o.steps.length*100);}
  function statusOf(o){var p=pctNum(o);return p===100?'concluida':p===0?'nao_iniciada':'em_andamento';}
  function daysOpen(o){
    if(!o.createdAt)return null;
    return Math.floor((now-new Date(o.createdAt).getTime())/DAY);
  }
  function daysSinceUpdate(o){
    var t=o.lastUpdatedAt||o.createdAt;
    if(!t)return null;
    return Math.floor((now-new Date(t).getTime())/DAY);
  }

  // bloco 1: pulse
  var concl=orders.filter(function(o){return statusOf(o)==='concluida';}).length;
  var andam=orders.filter(function(o){return statusOf(o)==='em_andamento';}).length;
  var nada=orders.filter(function(o){return statusOf(o)==='nao_iniciada';}).length;
  var paradas=orders.filter(function(o){
    if(statusOf(o)==='concluida')return false;
    var d=daysSinceUpdate(o);
    return d!==null&&d>=3;
  });

  // wires urgentes (Subscription com wire em <=2 dias)
  var wireUrg=orders.filter(function(o){
    if(o.tipo==='Redemption'||!o.wire||statusOf(o)==='concluida')return false;
    var wd=new Date(o.wire+'T00:00:00').getTime();
    var diff=Math.round((wd-now)/DAY);
    return diff>=0&&diff<=2;
  });
  var wireVenc=orders.filter(function(o){
    if(o.tipo==='Redemption'||!o.wire||statusOf(o)==='concluida')return false;
    var wd=new Date(o.wire+'T00:00:00').getTime();
    return Math.round((wd-now)/DAY)<0;
  });

  // bloco distribuicao por tipo
  var sub=orders.filter(function(o){return o.tipo==='Subscription';}).length;
  var red=orders.filter(function(o){return o.tipo==='Redemption';}).length;

  // bloco volume por moeda (somente em andamento + nao iniciada — ainda em pipeline)
  var pipeline={};
  orders.forEach(function(o){
    if(statusOf(o)==='concluida')return;
    var m=o.moeda||'USD';
    if(!pipeline[m])pipeline[m]=0;
    pipeline[m]+=parseFloat(o.valor)||0;
  });

  // bloco por gestora
  var byGest={};
  orders.forEach(function(o){
    var g=o.gestora||'(sem gestora)';
    if(!byGest[g])byGest[g]={total:0,andamento:0,concl:0};
    byGest[g].total++;
    if(statusOf(o)==='concluida')byGest[g].concl++;
    else byGest[g].andamento++;
  });
  var gestList=Object.keys(byGest).map(function(g){return{nome:g,d:byGest[g]};});
  gestList.sort(function(a,b){return b.d.total-a.d.total;});

  // bloco por mes de criacao (ultimos 6 meses)
  var months=[];
  var monthMap={};
  var d=new Date();d.setDate(1);
  for(var k=0;k<6;k++){
    var key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    months.unshift({key:key,label:d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}),sub:0,red:0});
    monthMap[key]=months[0];
    d.setMonth(d.getMonth()-1);
  }
  orders.forEach(function(o){
    if(!o.createdAt)return;
    var dt=new Date(o.createdAt);
    var key=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
    if(monthMap[key]){
      if(o.tipo==='Redemption')monthMap[key].red++;
      else monthMap[key].sub++;
    }
  });
  var maxMonth=Math.max(1,months.reduce(function(a,m){return Math.max(a,m.sub+m.red);},0));

  // bloco por usuario (a partir de createdBy/lastUpdatedBy)
  var byUser={};
  orders.forEach(function(o){
    if(o.createdBy){if(!byUser[o.createdBy])byUser[o.createdBy]={criou:0,tocou:0};byUser[o.createdBy].criou++;}
    if(o.lastUpdatedBy){if(!byUser[o.lastUpdatedBy])byUser[o.lastUpdatedBy]={criou:0,tocou:0};byUser[o.lastUpdatedBy].tocou++;}
  });
  var userList=Object.keys(byUser).map(function(u){return{nome:u,d:byUser[u]};});
  userList.sort(function(a,b){return b.d.tocou-a.d.tocou;});

  // ultima atividade por ordem (top 5)
  var recent=orders.filter(function(o){return o.lastUpdatedAt||o.createdAt;}).slice();
  recent.sort(function(a,b){
    var ta=new Date(a.lastUpdatedAt||a.createdAt).getTime();
    var tb=new Date(b.lastUpdatedAt||b.createdAt).getTime();
    return tb-ta;
  });
  recent=recent.slice(0,8);

  // ─── render ───
  var h='<div class="ca" style="padding:1.5rem;margin-bottom:1rem">';

function wireMask(v){
  if(!v)return '';
  var s=String(v);
  if(s.length<=4)return Array(s.length+1).join('*');
  return Array(Math.max(0,s.length-4)+1).join('*')+s.slice(-4);
}
function wireIsSensitive(k){
  return k==='benefAccount'||k==='intABA'||k==='intSwift'||k==='intIBAN'||k==='corrABA'||k==='corrSwift';
}

function wireRow(lbl,key,w){
  var v=w[key];
  if(!v)return '';
  var sensitive=wireIsSensitive(key);
  var shown=!sensitive||S.wireReveal[w.id+':'+key];
  var display=shown?esc(v):esc(wireMask(v));
  var btn=sensitive?'<button class="btn sm" style="padding:2px 8px;font-size:11px;margin-left:8px" onclick="wireToggleField(\''+esc(w.id)+'\',\''+key+'\')">'+(shown?'ocultar':'revelar')+'</button>':'';
  return '<div style="display:flex;align-items:baseline;gap:8px"><span style="display:inline-block;min-width:180px;color:#626367">'+lbl+':</span><span style="flex:1">'+display+'</span>'+btn+'</div>';
}
function wireAllRevealed(id){
  var w=null;for(var i=0;i<S.wires.length;i++)if(S.wires[i].id===id){w=S.wires[i];break;}
  if(!w)return false;
  var keys=['benefAccount','intABA','intSwift','intIBAN','corrABA','corrSwift'];
  var anyPresent=false;var all=true;
  for(var k=0;k<keys.length;k++){
    if(w[keys[k]]){anyPresent=true;if(!S.wireReveal[id+':'+keys[k]]){all=false;break;}}
  }
  return anyPresent&&all;
}
function wireToggleAll(id){
  var all=wireAllRevealed(id);
  var w=null;for(var i=0;i<S.wires.length;i++)if(S.wires[i].id===id){w=S.wires[i];break;}
  if(!w)return;
  var keys=['benefAccount','intABA','intSwift','intIBAN','corrABA','corrSwift'];
  for(var k=0;k<keys.length;k++){
    if(w[keys[k]]){
      if(all)delete S.wireReveal[id+':'+keys[k]];
      else S.wireReveal[id+':'+keys[k]]=true;
    }
  }
  R();
}
function wireToggleField(id,key){
  var k=id+':'+key;
  if(S.wireReveal[k])delete S.wireReveal[k];
  else S.wireReveal[k]=true;
  R();
}
function wireCopy(id){
  var w=null;for(var i=0;i<S.wires.length;i++)if(S.wires[i].id===id){w=S.wires[i];break;}
  if(!w)return;
  var txt=w.name+(w.currency?' ('+w.currency+')':'')+'\n\n';
  if(w.benefName)txt+='Beneficiary Name:    '+w.benefName+'\n';
  if(w.benefAccount)txt+='Account Number:      '+w.benefAccount+'\n';
  if(w.benefAddress)txt+='Beneficiary Address: '+w.benefAddress+'\n';
  if(w.intBank||w.intABA||w.intSwift||w.intIBAN){
    txt+='\nINTERMEDIARY BANK\n';
    if(w.intBank)txt+='Bank Name:    '+w.intBank+'\n';
    if(w.intAddress)txt+='Bank Address: '+w.intAddress+'\n';
    if(w.intABA)txt+='ABA:          '+w.intABA+'\n';
    if(w.intSwift)txt+='SWIFT:        '+w.intSwift+'\n';
    if(w.intIBAN)txt+='IBAN:         '+w.intIBAN+'\n';
  }
  if(w.corrBank||w.corrABA||w.corrSwift){
    txt+='\nCORRESPONDENT BANK\n';
    if(w.corrBank)txt+='Bank Name: '+w.corrBank+'\n';
    if(w.corrABA)txt+='ABA:       '+w.corrABA+'\n';
    if(w.corrSwift)txt+='SWIFT:     '+w.corrSwift+'\n';
  }
  if(w.notes)txt+='\nObs: '+w.notes+'\n';
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(function(){showSave();},function(){fallbackCopy(txt);});
    }else{fallbackCopy(txt);}
  }catch(e){fallbackCopy(txt);}
}
function fallbackCopy(txt){
  var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';

  try{document.execCommand('copy');showSave();}catch(e){}
  document.body.removeChild(ta);
}

    h+='<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:12px">';
    h+='<div><label style="font-weight:700">Fundo investidor</label><span style="font-size:15px;color:#2D2D2D">'+esc(o.fi||'\u2014')+'</span></div>';
    h+='<div><label style="font-weight:700">Fundo investido</label><span style="font-size:15px;color:#2D2D2D">'+esc(o.fiv||'\u2014')+'</span></div>';
    h+='<div><label style="font-weight:700">Gestora / Admin.</label><span style="font-size:15px;color:#2D2D2D">'+esc(o.gestora||'\u2014')+'</span></div>';
    h+='<div><label style="font-weight:700">Tipo</label><span style="font-size:15px;color:#2D2D2D">'+esc(o.tipo||'\u2014')+'</span></div></div>';
    h+='<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:12px">';
    h+='<div><label style="font-weight:700">'+(o.inKind?'Shares':'Valor enviado')+'</label><span style="font-size:16px;color:#2D2D2D">'+fmtV(o)+'</span></div>';
    h+='<div><label style="font-weight:700">Moeda</label><span style="font-size:15px;color:#2D2D2D">'+(o.inKind?'In-Kind':esc(o.moeda||'\u2014'))+'</span></div>';
    h+='<div><label style="font-weight:700">Data Limite Wire</label><span style="font-size:15px;color:'+(ws&&ws.cls?'#A32D2D':'#2D2D2D')+'">'+(fmtD(o.wire)||'\u2014')+(ws?' <span class="badge '+ws.badge+'">'+ws.lbl+'</span>':'')+'</span></div>';
    h+='<div><label style="font-weight:700">In-Kind</label><span class="badge '+(o.inKind?'b-ik':'b-no')+'">'+(o.inKind?'Sim':'N\u00e3o')+'</span></div></div>';
    h+='<div style="border-top:1px solid #e0e0e0;padding-top:12px"><label style="font-weight:700">Valor confirmado pela contraparte</label>';
    h+='<div style="display:flex;gap:10px;align-items:center;margin-top:4px"><input type="number" style="max-width:220px" placeholder="Digite o valor confirmado..." value="'+(o.valorConfirmado||'')+'" onchange="updConfirmado(\''+o.id+'\',this.value)">'+(o.valorConfirmado?'<span style="font-size:15px;font-weight:500;color:#2D2D2D">'+fmtNum(o.valorConfirmado,o.moeda)+'</span>':'')+'</div>';
    if(dv)h+='<div class="div-alert">&#9888; Diverg\u00eancia: enviado '+fmtV(o)+' &middot; confirmado '+fmtNum(o.valorConfirmado,o.moeda)+'</div>';
    h+='</div></div>';
  }
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;margin-top:1rem">';
  h+='<span style="font-size:14px;font-weight:700;color:#2D2D2D">'+dn+'/'+o.steps.length+' etapas conclu\u00eddas &middot; '+p+'%</span>';
  h+='<div style="display:flex;gap:6px;align-items:center"><button class="btn sm" onclick="navStep('+(f-1)+')" '+(f===0?'disabled':'')+'>&#8592;</button><span style="font-size:13px;padding:0 4px;font-weight:700;color:#2D2D2D">Etapa '+(f+1)+' de '+o.steps.length+'</span><button class="btn sm" onclick="navStep('+(f+1)+')" '+(f===o.steps.length-1?'disabled':'')+'>&#8594;</button><button class="btn sm" style="font-weight:700" onclick="resetSt(\''+o.id+'\')">Resetar</button></div></div>';
  h+='<div class="pb" style="margin-bottom:1.25rem"><div class="pf" style="width:'+p+'%"></div></div><div>';
  var ST=getSteps(o);
  for(var i=0;i<ST.length;i++){
    var s=ST[i];var st=o.steps[i];
    var dist=Math.abs(i-f);var isActive=dist===0;
    var ist='';
    if(dist===1)ist='transform:scale(0.985);opacity:0.72;filter:blur(0.6px);';
    else if(dist===2)ist='transform:scale(0.97);opacity:0.5;filter:blur(1.2px);';
    else if(dist>=3)ist='transform:scale(0.96);opacity:0.35;filter:blur(2px);';
    h+='<div class="step-item'+(isActive?' s-active':'')+(st.done?' s-done':'')+'" style="'+ist+'" onclick="setFocus('+i+')">';
    h+='<div style="display:flex;align-items:flex-start;gap:10px"><div class="snum'+(st.done?' dn':'')+'">'+s.n+'</div>';
    h+='<div style="flex:1"><div style="display:flex;align-items:flex-start;gap:8px"><input type="checkbox" style="margin-top:3px" '+(st.done?'checked':'')+' onchange="togStep(\''+o.id+'\','+i+',this.checked)" onclick="event.stopPropagation()">';
    h+='<span style="font-size:'+(isActive?'15px':'14px')+';font-weight:'+(isActive?'600':'400')+';line-height:1.5;color:'+(st.done?'#aaa':'#2D2D2D')+';'+(st.done?'text-decoration:line-through;':'')+'">'+esc(s.lbl)+'</span></div>';
    h+='<div style="font-size:12px;color:#626367;margin-top:4px;margin-left:24px"><span class="tag">'+s.resp+'</span>'+esc(s.prazo)+'</div>';
    if(st.obs&&!isActive)h+='<div style="font-size:12px;color:#626367;margin-top:4px;margin-left:24px;font-style:italic">'+esc(st.obs)+'</div>';
    if(isActive)h+='<input type="text" style="margin-top:8px;font-size:13px;padding:6px 10px;margin-left:24px;width:calc(100% - 24px)" placeholder="Observa\u00e7\u00e3o..." value="'+esc(st.obs||'')+'" data-oid="'+o.id+'" data-idx="'+i+'" onchange="updObs(this)" onclick="event.stopPropagation()">';
    h+='</div></div></div>';
  }
  h+='</div>';
  return h;
}

function rForm(isEdit,o){
  var fi=S.funds.investidor;var fiv=S.funds.investido;
  var ik=isEdit?o.inKind:_ik;
  var h='<div class="ifrm" id="order-form">'+DL();
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem"><div><div style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#F15D1B;font-weight:700;margin-bottom:2px">'+(isEdit?'Editar ordem':'Nova ordem')+'</div><span style="font-weight:700;font-size:16px;color:#2D2D2D">Detalhes da ordem</span></div><button class="btn sm" onclick="'+(isEdit?'cancelEdit()':'togForm()')+'">Cancelar</button></div>';
  h+='<div class="fr"><div class="fg"><label>Fundo investidor</label><select id="f-fi"><option value="">Selecione...</option>';
  fi.forEach(function(f){h+='<option value="'+esc(f)+'"'+(isEdit&&o.fi===f?' selected':'')+'>'+esc(f)+'</option>';});
  h+='</select></div><div class="fg"><label>Fundo investido</label><select id="f-fiv"><option value="">Selecione...</option>';
  fiv.forEach(function(f){h+='<option value="'+esc(f)+'"'+(isEdit&&o.fiv===f?' selected':'')+'>'+esc(f)+'</option>';});
  h+='</select></div></div>';
  h+='<div class="fg"><label>Gestora / Administradora do fundo investido</label><input type="text" id="f-gest" list="gest-dl" value="'+esc(isEdit?o.gestora||'':'')+'"></div>';
  h+='<div class="fr"><div class="fg"><label>Tipo</label><select id="f-tipo"><option value="Subscription"'+((!isEdit||o.tipo==='Subscription')?' selected':'')+'>Subscription</option><option value="Redemption"'+(isEdit&&o.tipo==='Redemption'?' selected':'')+'>Redemption</option></select></div>';
  if(!ik){h+='<div class="fg"><label>Moeda</label><select id="f-moe"><option value="USD"'+((!isEdit||o.moeda==='USD')?' selected':'')+'>USD</option><option value="EUR"'+(isEdit&&o.moeda==='EUR'?' selected':'')+'>EUR</option><option value="BRL"'+(isEdit&&o.moeda==='BRL'?' selected':'')+'>BRL</option></select></div>';}
  else{h+='<div class="fg"><label>&nbsp;</label><div style="padding:9px 12px;background:#F7F7F7;border-radius:8px;font-size:13px;color:#626367">In-Kind \u2014 sem moeda</div></div>';}
  h+='</div><div class="fr3"><div class="fg"><label>'+(ik?'Shares':'Valor')+'</label><input type="number" id="f-val" placeholder="0" min="0" value="'+(isEdit?o.valor||0:'')+'"></div>';
  h+='<div class="fg"><label>Data Limite Wire</label><input type="date" id="f-wire" value="'+(isEdit&&o.wire?o.wire:'')+'"></div>';
  h+='<div class="fg" style="display:flex;flex-direction:column;justify-content:flex-end"><label>In-Kind</label><div class="tog-wrap" onclick="'+(isEdit?'togEditIK(\''+o.id+'\')':'togIK()')+'"><div class="tog'+(ik?' on':'')+'"></div><span style="font-size:14px;color:#2D2D2D">'+(ik?'Sim':'N\u00e3o')+'</span></div></div></div>';
  h+='<div style="display:flex;justify-content:flex-end"><button class="btn p" style="padding:9px 24px;font-size:14px;font-weight:600" onclick="'+(isEdit?'saveEditOrd(\''+o.id+'\')':'createOrd()')+'">'+( isEdit?'Salvar altera\u00e7\u00f5es':'Criar ordem &#8594;')+'</button></div></div>';
  return h;
}

function vFunds(){
  var h='<div style="margin-bottom:1.5rem"><div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#F15D1B;font-weight:700;margin-bottom:4px">Configura\u00e7\u00f5es</div><h1 style="font-size:22px;font-weight:700;color:#2D2D2D">Gerenciar fundos</h1></div>';

  // Fundos investidores e investidos em grid compacto
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">';
  var keys=[['investidor','Fundos investidores'],['investido','Fundos investidos']];
  for(var k=0;k<keys.length;k++){
    var key=keys[k][0],lbl=keys[k][1],lst=S.funds[key]||[];
    h+='<div class="card" style="border-top:3px solid #F15D1B">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    h+='<div style="font-weight:700;color:#4F5053;font-size:15px">'+lbl+' <span style="font-size:12px;color:#888;font-weight:400">('+lst.length+')</span></div>';
    h+='<button class="btn sm" onclick="addF(\''+key+'\')">+ Adicionar</button></div>';
    h+='<div style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:5px">';
    for(var i=0;i<lst.length;i++){
      h+='<div style="display:flex;gap:6px"><input type="text" value="'+esc(lst[i])+'" style="font-size:13px;padding:6px 8px" onchange="editF(\''+key+'\','+i+',this.value)">';
      h+='<button class="btn sm" style="flex-shrink:0" onclick="rmvF(\''+key+'\','+i+')">&times;</button></div>';
    }
    h+='</div></div>';
  }
  h+='</div>';

  // Gestoras — busca + lista virtualizada
  var admins=S.funds.admins||[];
  var admQ=(S.admSearch||'').toLowerCase();
  var admFiltered=admQ?admins.filter(function(a){return a.toLowerCase().indexOf(admQ)>=0;}):admins;

  h+='<div class="card" style="border-top:3px solid #F15D1B">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  h+='<div style="font-weight:700;color:#4F5053;font-size:15px">Gestoras / Administradoras <span style="font-size:12px;color:#888;font-weight:400">('+admFiltered.length+'/'+admins.length+')</span></div>';
  h+='<button class="btn sm" onclick="addAdm()">+ Adicionar</button></div>';
  h+='<input type="text" id="adm-search" placeholder="Buscar gestora ou administradora..." style="margin-bottom:10px;font-size:13px;padding:6px 10px" value="'+esc(S.admSearch||'')+'" oninput="admSearch(this.value)">';
  h+='<div id="adm-new">';
  if(S.admNew){
    h+='<div style="display:flex;gap:6px;margin-bottom:10px">';
    h+='<input type="text" id="adm-input" placeholder="Nome da gestora/administradora..." style="flex:1;font-size:13px;padding:6px 10px">';
    h+='<button class="btn sm p" onclick="saveAdm()">Adicionar</button>';
    h+='<button class="btn sm" onclick="cancelAdm()">Cancelar</button></div>';
  }
  h+='</div>';

  // Duas colunas com scroll
  h+='<div data-scroll-id="adm-list" style="display:grid;grid-template-columns:1fr 1fr;gap:5px;max-height:300px;overflow-y:auto">';
  for(var i=0;i<admFiltered.length;i++){
    var realIdx=admins.indexOf(admFiltered[i]);
    h+='<div style="display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:6px;background:#F7F7F7">';
    h+='<span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(admFiltered[i])+'">'+esc(admFiltered[i])+'</span>';
    h+='<button class="btn sm" onclick="admEditInline('+realIdx+')" style="padding:1px 6px;font-size:11px;flex-shrink:0">&#9998;</button>';
    h+='<button onclick="rmvF(\'admins\','+realIdx+')" style="background:none;border:none;cursor:pointer;color:#c0392b;font-size:14px;padding:0 2px;line-height:1;flex-shrink:0">&times;</button></div>';
  }
  if(admFiltered.length===0)h+='<div style="color:#888;font-size:13px;padding:8px;grid-column:span 2">Nenhuma gestora encontrada.</div>';
  h+='</div>';
  h+='<p style="font-size:11px;color:#aaa;margin-top:8px">'+admFiltered.length+' exibidas &middot; Salvo automaticamente.</p>';
  h+='</div>';
  return h;
}

// ─── ACTIONS ──────────────────────────────────────────────
function go(v){S.view=v;S.showForm=false;S.editId=null;S.onDetail=null;S.onEdit=null;S.onNew=false;S.wireDetail=null;S.wireEdit=null;S.wireNew=false;S.wireSearch='';S.wireReveal={};S.placeholderTitle='';S.cotasCell=null;S.cotasSelected=null;var ov=document.getElementById('cotas-overlay');if(ov){ov.style.display='none';ov.innerHTML='';}var sc=document.getElementById('cotas-scroll');if(sc)sc._scrollInitialized=false;R();}
function goPlaceholder(title){S.view='placeholder';S.placeholderTitle=title;R();}
function setFilter(k,v){S.filters[k]=v;R();}
function clearFilters(){S.filters={fiv:'',tipo:'',status:''};R();}
function openDet(id){S.selId=id;S.view='detail';S.editId=null;var o=null;for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===id){o=S.orders[i];break;}}if(o){var idx=-1;for(var j=0;j<o.steps.length;j++){if(!o.steps[j].done){idx=j;break;}}S.focusStep=idx<0?0:idx;}R();}
function togForm(){S.showForm=!S.showForm;_ik=false;R();if(S.showForm)setTimeout(function(){var f=document.getElementById('order-form');if(f)f.scrollIntoView({behavior:'smooth',block:'start'});},60);}
function togIK(){_ik=!_ik;R();}
function togEditIK(id){for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===id){S.orders[i].inKind=!S.orders[i].inKind;break;}}R();}
function setFocus(i){S.focusStep=i;R();}
function navStep(i){var o=null;for(var k=0;k<S.orders.length;k++)if(S.orders[k].id===S.selId){o=S.orders[k];break;}var max=o?o.steps.length:17;if(i>=0&&i<max){S.focusStep=i;R();}}
function startEdit(id){S.editId=id;R();}
function cancelEdit(){S.editId=null;R();}
function createOrd(){
  var ik=_ik;var moe=document.getElementById('f-moe');
  var tp=document.getElementById('f-tipo').value;
  var ST=tp==='Redemption'?STEPS_RED:STEPS_SUB;
  var now=new Date().toISOString();
  var o={id:uid(),fi:document.getElementById('f-fi').value,fiv:document.getElementById('f-fiv').value,gestora:document.getElementById('f-gest').value.trim(),tipo:tp,valor:parseFloat(document.getElementById('f-val').value)||0,moeda:ik?'SHARES':(moe?moe.value:'USD'),wire:document.getElementById('f-wire').value||null,inKind:ik,valorConfirmado:null,steps:ST.map(function(){return{done:false,obs:''};},this),createdAt:now,createdBy:currentUser||'',lastUpdatedAt:now,lastUpdatedBy:currentUser||''};
  S.orders.unshift(o);S.showForm=false;saveO();R();
}
function saveEditOrd(id){
  for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===id){var o=S.orders[i];o.fi=document.getElementById('f-fi').value;o.fiv=document.getElementById('f-fiv').value;o.gestora=document.getElementById('f-gest').value.trim();o.tipo=document.getElementById('f-tipo').value;o.valor=parseFloat(document.getElementById('f-val').value)||0;var moe=document.getElementById('f-moe');o.moeda=o.inKind?'SHARES':(moe?moe.value:'USD');o.wire=document.getElementById('f-wire').value||null;o.lastUpdatedAt=new Date().toISOString();o.lastUpdatedBy=currentUser||'';break;}}
  S.editId=null;saveO();R();
}
function delOrd(id){S.orders=S.orders.filter(function(o){return o.id!==id;});S.view='orders';S.editId=null;saveO();R();}
function togStep(id,idx,val){
  for(var i=0;i<S.orders.length;i++){
    if(S.orders[i].id===id){
      S.orders[i].steps[idx].done=val;
      S.orders[i].lastUpdatedAt=new Date().toISOString();
      S.orders[i].lastUpdatedBy=currentUser||'';
      if(val){
        var next=idx+1;
        if(next<S.orders[i].steps.length) S.focusStep=next;
      }
      break;
    }
  }
  saveO();R();
}
function updObs(el){for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===el.dataset.oid){S.orders[i].steps[parseInt(el.dataset.idx)].obs=el.value;break;}}saveO();}
function updConfirmado(id,val){for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===id){S.orders[i].valorConfirmado=val===''?null:parseFloat(val);break;}}saveO();R();}
function resetSt(id){for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===id){S.orders[i].steps.forEach(function(s){s.done=false;s.obs='';});break;}}saveO();R();}
function addF(t){if(!S.funds[t])S.funds[t]=[];S.funds[t].push('');saveF();R();}
function editF(t,i,v){if(S.funds[t])S.funds[t][i]=v;saveF();}
function rmvF(t,i){if(S.funds[t])S.funds[t].splice(i,1);saveF();R();}
var _admSearchTimer=null;
function admSearch(v){S.admSearch=v;clearTimeout(_admSearchTimer);_admSearchTimer=setTimeout(function(){R();},300);}
function admEditInline(i){var v=prompt('Editar gestora:',S.funds.admins[i]);if(v===null)return;S.funds.admins[i]=v.trim();saveF();R();}
function addAdm(){S.admNew=true;R();setTimeout(function(){var el=document.getElementById('adm-input');if(el)el.focus();},50);}
function cancelAdm(){S.admNew=false;R();}
function saveAdm(){var el=document.getElementById('adm-input');if(!el)return;var v=el.value.trim();if(!v)return;if(!S.funds.admins)S.funds.admins=[];S.funds.admins.push(v);S.admNew=false;saveF();R();}

// ─── ONSHORE ACTIONS ──────────────────────────────────────
var _searchTimer=null;
function onSearch(v){
  S.onSearch=v;
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(function(){R();},400);
}
function onOpenDetail(i){S.onDetail=S.onDetail===i?null:i;S.onEdit=null;R();}
function closeOnDetail(){S.onDetail=null;R();}
function onNewFund(){S.onNew=true;S.onDetail=null;S.onEdit=null;R();setTimeout(function(){var f=document.getElementById('order-form')||document.querySelector('.ifrm');if(f)f.scrollIntoView({behavior:'smooth',block:'start'});},60);}
function cancelOnNew(){S.onNew=false;R();}
function saveOnNew(){
  var row=[];
  for(var i=0;i<ON_COLS.length;i++){var el=document.getElementById('onf-'+i);row.push(el?el.value.trim():'');}
  S.onshore.push(row);S.onNew=false;saveOn();R();
}
function onEditFund(i){S.onEdit=i;S.onDetail=null;R();}
function cancelOnEdit(){S.onEdit=null;R();}
function saveOnEdit(){
  var i=S.onEdit;if(i===null)return;
  var row=[];
  for(var c=0;c<ON_COLS.length;c++){var el=document.getElementById('onf-'+c);row.push(el?el.value.trim():'');}
  S.onshore[i]=row;S.onEdit=null;saveOn();R();
}
function onDelFund(i){if(!confirm('Excluir este fundo da Base Onshore?'))return;S.onshore.splice(i,1);S.onDetail=null;S.onEdit=null;saveOn();R();}
</script>
</body>
</html>
