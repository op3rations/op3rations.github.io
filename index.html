<title>Demandas Operations</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#2D2D2D;font-size:16px;line-height:1.6;background:#F7F7F7;padding:1rem}
.wrap{max-width:1100px;margin:0 auto;background:#fff;border-radius:12px;padding:1.5rem;min-height:100vh;border:1px solid #e0e0e0}
.nav{display:flex;gap:6px;padding-bottom:12px;border-bottom:1px solid #ddd;margin-bottom:1.25rem;align-items:center;flex-wrap:wrap}
.nb{background:none;border:none;padding:6px 16px;cursor:pointer;border-radius:8px;color:#626367;font-size:14px}
.nb.active{background:#4F5053;color:#fff;font-weight:600}
.nb:hover:not(.active){background:#F7F7F7;color:#2D2D2D}
.btn{padding:7px 16px;border:1px solid #ccc;background:#fff;border-radius:8px;cursor:pointer;font-size:14px;color:#2D2D2D}
.btn:hover{background:#F7F7F7}
.btn.p{background:#F15D1B;color:#fff;border-color:transparent}
.btn.p:hover{background:#d44e14}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.dr{color:#c0392b;border-color:#e0b0b0}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem}
.pb{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;background:#F15D1B;transition:width .3s}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.b-ok{background:#EAF3DE;color:#2d7a2d}
.b-warn{background:#FAEEDA;color:#854F0B}
.b-info{background:#F7F7F7;color:#4F5053}
.b-ik{background:#E1F5EE;color:#0F6E56}
.b-no{background:#F7F7F7;color:#626367}
.b-red{background:#FCEBEB;color:#A32D2D}
.b-ora{background:#FDE8DC;color:#d44e14}
input,select,textarea{font-family:inherit;font-size:15px;font-weight:500;color:#2D2D2D;background:#fff;border:1px solid #ccc;border-radius:8px;padding:9px 12px;width:100%}
textarea{resize:vertical;min-height:60px;font-size:13px}
input[type=checkbox]{width:auto;accent-color:#F15D1B;transform:scale(1.2)}
input:focus,select:focus,textarea:focus{outline:none;box-shadow:0 0 0 2px #F5C5A8;border-color:#F15D1B}
label{font-size:11px;color:#626367;font-weight:700;text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:5px}
.fg{margin-bottom:12px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.fr4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.ifrm{background:#F7F7F7;border:2px solid #F15D1B;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.tog-wrap{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;user-select:none}
.tog{width:36px;height:20px;background:#ccc;border-radius:10px;position:relative;transition:background .2s;flex-shrink:0}
.tog.on{background:#F15D1B}
.tog::after{content:'';position:absolute;width:14px;height:14px;background:white;border-radius:50%;top:3px;left:3px;transition:left .2s}
.tog.on::after{left:19px}
.step-item{padding:14px 16px;border-radius:12px;cursor:pointer;transition:transform .25s,opacity .25s,filter .25s;margin-bottom:8px;border:1px solid #e0e0e0;background:#fff}
.step-item.s-active{border:1px solid #F5C5A8;border-left:3px solid #F15D1B}
.step-item.s-done{background:#EAF3DE;border-color:#C0DD97}
.snum{width:26px;height:26px;border-radius:50%;background:#FDE8DC;color:#F15D1B;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.snum.dn{background:#EAF3DE;color:#2d7a2d}
.tag{display:inline-flex;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;background:#F7F7F7;color:#626367;margin-right:4px}
.ord-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;cursor:pointer;transition:border-color .18s}
.ord-card:hover{border-color:#F5C5A8;border-left:3px solid #F15D1B}
.ord-card.wire-urgent{border-color:#f09595;border-left:3px solid #E24B4A}
.ord-card.wire-overdue{border-color:#E24B4A;border-left:3px solid #A32D2D;background:#FFF8F8}
.div-alert{background:#FCEBEB;border:1px solid #f09595;border-radius:8px;padding:8px 12px;font-size:13px;color:#A32D2D;font-weight:600;margin-top:10px}
.save-bar{position:fixed;bottom:16px;right:16px;background:#4F5053;color:#fff;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;display:none;z-index:999}
.save-bar.vis{display:block}
.err-bar{position:fixed;bottom:16px;right:16px;background:#c0392b;color:#fff;font-size:12px;font-weight:600;padding:8px 16px;border-radius:20px;display:none;z-index:999}
.err-bar.vis{display:block}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-bar select{width:auto;font-size:13px;padding:6px 10px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;background:#F7F7F7;border-bottom:2px solid #e0e0e0;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#626367;font-weight:700;white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:top}
.tbl tr:hover td{background:#FDE8DC22;cursor:pointer}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid #e0e0e0}
.detail-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.detail-item{background:#F7F7F7;border-radius:8px;padding:10px 12px}
.detail-item label{font-size:10px;color:#F15D1B;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.detail-item span{font-size:13px;color:#2D2D2D;font-weight:500;word-break:break-word}
</style>
</head>

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function pct(o){return Math.round(o.steps.filter(function(s){return s.done;}).length/STEPS.length*100);}
function ostatus(o){var p=pct(o);return p===100?'Conclu\u00eddo':p===0?'N\u00e3o iniciado':'Em andamento';}
function bcls(o){var p=pct(o);return p===100?'b-ok':p===0?'b-info':'b-warn';}
function fmtV(o){if(!o.valor)return'\u2014';if(o.inKind)return o.valor+' shares';try{return new Intl.NumberFormat('pt-BR',{style:'currency',currency:o.moeda||'USD',maximumFractionDigits:0}).format(o.valor);}catch(e){return o.valor;}}
function fmtNum(v,m){if(!v&&v!==0)return'\u2014';try{return new Intl.NumberFormat('pt-BR',{style:'currency',currency:m||'USD',maximumFractionDigits:0}).format(v);}catch(e){return v;}}
function fmtD(d){if(!d)return null;var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function DL(){return '<datalist id="gest-dl">'+(S.funds.admins||ADMINS_DEF).map(function(g){return '<option value="'+esc(g)+'">';}).join('')+'</datalist>';}

function wireStatus(o){
  if(!o.wire)return null;
  var today=new Date();today.setHours(0,0,0,0);
  var wd=new Date(o.wire+'T00:00:00');
  var diff=Math.round((wd-today)/(1000*60*60*24));
  if(diff<0)return{cls:'wire-overdue',badge:'b-red',lbl:'Wire vencida'};
  if(diff===0)return{cls:'wire-urgent',badge:'b-red',lbl:'Wire hoje'};
  if(diff===1)return{cls:'wire-urgent',badge:'b-ora',lbl:'Wire amanh\u00e3'};
  if(diff===2)return{cls:'wire-urgent',badge:'b-ora',lbl:'Wire em 2 dias'};
  return{cls:'',badge:'b-info',lbl:'Wire: '+fmtD(o.wire)};
}
function hasDivergence(o){if(!o.valorConfirmado&&o.valorConfirmado!==0)return false;return parseFloat(o.valorConfirmado)!==parseFloat(o.valor);}

function enviarEmail(){
  var DEST=[

// ─── RENDER ───────────────────────────────────────────────
function R(){
  var root=document.getElementById('root');if(!root)return;
  if(S.loading){root.innerHTML='<div style="text-align:center;padding:4rem;color:#626367"><div style="font-size:14px;color:#F15D1B;font-weight:600">Carregando dados...</div></div>';return;}

  // salva foco antes de renderizar
  var focusId=document.activeElement?document.activeElement.id:null;
  var focusSel=document.activeElement&&document.activeElement.selectionStart!==undefined?document.activeElement.selectionStart:null;

  try{
    var h='<div class="nav">'+LOGO(56,22);
    h+='<button class="nb'+(S.view==='orders'?' active':'')+'" onclick="go(\'orders\')">Ordens</button>';
    h+='<button class="nb'+(S.view==='onshore'?' active':'')+'" onclick="go(\'onshore\')">Base Onshore</button>';
    h+='<button class="nb'+(S.view==='funds'?' active':'')+'" onclick="go(\'funds\')">Fundos</button>';
    h+='<button class="nb'+(S.view==='docs'?' active':'')+'" onclick="go(\'docs\')">Documentos</button>';
    h+='<button class="nb'+(S.view==='email'?' active':'')+'" onclick="go(\'email\')">E-mail</button>';
    h+='<div style="margin-left:auto;display:flex;align-items:center;gap:10px"><span style="font-size:13px;color:#626367">'+esc(currentUser||'')+'</span><button class="btn sm dr" onclick="logout()">Sair</button></div></div>';
    if(S.view==='orders')h+=vOrders();
    else if(S.view==='detail')h+=vDetail();
    else if(S.view==='onshore')h+=vOnshore();
    else if(S.view==='email')h+=vEmail();
    else if(S.view==='docs')h+=vDocs();
    else h+=vFunds();
    root.innerHTML=h;

    // restaura foco
    if(focusId){
      var el=document.getElementById(focusId);
      if(el){
        el.focus();
        if(focusSel!==null&&el.setSelectionRange){
          try{el.setSelectionRange(focusSel,focusSel);}catch(e){}
        }
      }
    }
  }catch(err){root.innerHTML='<div style="padding:2rem;color:#c0392b;background:#FCEBEB;border-radius:8px;margin:1rem">Erro: '+err.message+'<br><br><button class="btn p" onclick="go(\'orders\')">Tentar novamente</button></div>';}
}

function vDetail(){
  var o=null;for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===S.selId){o=S.orders[i];break;}}
  if(!o){go('orders');return'';}
  var dn=o.steps.filter(function(s){return s.done;}).length;var p=pct(o);var f=S.focusStep;
  var ws=wireStatus(o);var dv=hasDivergence(o);
  var h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem">';
  h+='<button class="btn sm" onclick="go(\'orders\')">&#8592; Voltar</button>';
  h+='<div style="flex:1"><div style="font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#F15D1B;margin-bottom:2px;font-weight:700">'+esc(o.tipo||'\u2014')+' &middot; '+esc(o.gestora||'\u2014')+'</div>';
  h+='<h1 style="font-size:16px;font-weight:700;color:#2D2D2D">'+esc(o.fi||'\u2014')+' <span style="color:#F15D1B">&#8594;</span> '+esc(o.fiv||'\u2014')+'</h1></div>';
  h+='<button class="btn sm" onclick="startEdit(\''+o.id+'\')" style="font-size:16px;padding:4px 10px">&#9998;</button>';
  h+='<button class="btn sm dr" onclick="delOrd(\''+o.id+'\')">Excluir</button></div>';
  if(S.editId===o.id){h+=rForm(true,o);}
  else{
    h+='<div class="card" style="margin-bottom:1rem;border-top:3px solid #F15D1B">';
    h+='<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:12px">';
    h+='<div><label style="font-weight:700">Fundo investidor</label><span style="font-size:15px;color:#2D2D2D">'+esc(o.fi||'\u2014')+'</span></div>';
    h+='<div><label style="font-weight:700">Fundo investido</label><span style="font-size:15px;color:#2D2D2D">'+esc(o.fiv||'\u2014')+'</span></div>';
    h+='<div><label style="font-weight:700">Gestora / Admin.</label><span style="font-size:15px;color:#2D2D2D">'+esc(o.gestora||'\u2014')+'</span></div>';
    h+='<div><label style="font-weight:700">Tipo</label><span style="font-size:15px;color:#2D2D2D">'+esc(o.tipo||'\u2014')+'</span></div></div>';
    h+='<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:12px">';
    h+='<div><label style="font-weight:700">'+(o.inKind?'Shares':'Valor enviado')+'</label><span style="font-size:16px;color:#2D2D2D">'+fmtV(o)+'</span></div>';
    h+='<div><label style="font-weight:700">Moeda</label><span style="font-size:15px;color:#2D2D2D">'+(o.inKind?'In-Kind':esc(o.moeda||'\u2014'))+'</span></div>';
    h+='<div><label style="font-weight:700">Data Limite Wire</label><span style="font-size:15px;color:'+(ws&&ws.cls?'#A32D2D':'#2D2D2D')+'">'+(fmtD(o.wire)||'\u2014')+(ws?' <span class="badge '+ws.badge+'">'+ws.lbl+'</span>':'')+'</span></div>';
    h+='<div><label style="font-weight:700">In-Kind</label><span class="badge '+(o.inKind?'b-ik':'b-no')+'">'+(o.inKind?'Sim':'N\u00e3o')+'</span></div></div>';
    h+='<div style="border-top:1px solid #e0e0e0;padding-top:12px"><label style="font-weight:700">Valor confirmado pela contraparte</label>';
    h+='<div style="display:flex;gap:10px;align-items:center;margin-top:4px"><input type="number" style="max-width:220px" placeholder="Digite o valor confirmado..." value="'+(o.valorConfirmado||'')+'" onchange="updConfirmado(\''+o.id+'\',this.value)">'+(o.valorConfirmado?'<span style="font-size:15px;font-weight:500;color:#2D2D2D">'+fmtNum(o.valorConfirmado,o.moeda)+'</span>':'')+'</div>';
    if(dv)h+='<div class="div-alert">&#9888; Diverg\u00eancia: enviado '+fmtV(o)+' &middot; confirmado '+fmtNum(o.valorConfirmado,o.moeda)+'</div>';
    h+='</div></div>';
  }
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;margin-top:1rem">';
  h+='<span style="font-size:14px;font-weight:700;color:#2D2D2D">'+dn+'/'+STEPS.length+' etapas conclu\u00eddas &middot; '+p+'%</span>';
  h+='<div style="display:flex;gap:6px;align-items:center"><button class="btn sm" onclick="navStep('+(f-1)+')" '+(f===0?'disabled':'')+'>&#8592;</button><span style="font-size:13px;padding:0 4px;font-weight:700;color:#2D2D2D">Etapa '+(f+1)+' de '+STEPS.length+'</span><button class="btn sm" onclick="navStep('+(f+1)+')" '+(f===STEPS.length-1?'disabled':'')+'>&#8594;</button><button class="btn sm" style="font-weight:700" onclick="resetSt(\''+o.id+'\')">Resetar</button></div></div>';
  h+='<div class="pb" style="margin-bottom:1.25rem"><div class="pf" style="width:'+p+'%"></div></div><div>';
  for(var i=0;i<STEPS.length;i++){
    var s=STEPS[i];var st=o.steps[i];
    var dist=Math.abs(i-f);var isActive=dist===0;
    var ist='';
    if(dist===1)ist='transform:scale(0.985);opacity:0.72;filter:blur(0.6px);';
    else if(dist===2)ist='transform:scale(0.97);opacity:0.5;filter:blur(1.2px);';
    else if(dist>=3)ist='transform:scale(0.96);opacity:0.35;filter:blur(2px);';
    h+='<div class="step-item'+(isActive?' s-active':'')+(st.done?' s-done':'')+'" style="'+ist+'" onclick="setFocus('+i+')">';
    h+='<div style="display:flex;align-items:flex-start;gap:10px"><div class="snum'+(st.done?' dn':'')+'">'+s.n+'</div>';
    h+='<div style="flex:1"><div style="display:flex;align-items:flex-start;gap:8px"><input type="checkbox" style="margin-top:3px" '+(st.done?'checked':'')+' onchange="togStep(\''+o.id+'\','+i+',this.checked)" onclick="event.stopPropagation()">';
    h+='<span style="font-size:'+(isActive?'15px':'14px')+';font-weight:'+(isActive?'600':'400')+';line-height:1.5;color:'+(st.done?'#aaa':'#2D2D2D')+';'+(st.done?'text-decoration:line-through;':'')+'">'+esc(s.lbl)+'</span></div>';
    h+='<div style="font-size:12px;color:#626367;margin-top:4px;margin-left:24px"><span class="tag">'+s.resp+'</span>'+esc(s.prazo)+'</div>';
    if(st.obs&&!isActive)h+='<div style="font-size:12px;color:#626367;margin-top:4px;margin-left:24px;font-style:italic">'+esc(st.obs)+'</div>';
    if(isActive)h+='<input type="text" style="margin-top:8px;font-size:13px;padding:6px 10px;margin-left:24px;width:calc(100% - 24px)" placeholder="Observa\u00e7\u00e3o..." value="'+esc(st.obs||'')+'" data-oid="'+o.id+'" data-idx="'+i+'" onchange="updObs(this)" onclick="event.stopPropagation()">';
    h+='</div></div></div>';
  }
  h+='</div>';
  return h;
}

    }
    h+='</div><button class="btn sm" onclick="addF(\''+key+'\')">+ Adicionar</button></div>';

  }

  h+='</div></div>';
  h+='<p style="font-size:13px;color:#626367;margin-top:1rem">Edite fundos diretamente. Salvo automaticamente.</p>';

// ─── ACTIONS ──────────────────────────────────────────────
function go(v){S.view=v;S.showForm=false;S.editId=null;S.onDetail=null;S.onEdit=null;S.onNew=false;R();}
function setFilter(k,v){S.filters[k]=v;R();}
function clearFilters(){S.filters={fiv:'',tipo:'',status:''};R();}
function openDet(id){S.selId=id;S.view='detail';S.editId=null;var o=null;for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===id){o=S.orders[i];break;}}if(o){var idx=-1;for(var j=0;j<o.steps.length;j++){if(!o.steps[j].done){idx=j;break;}}S.focusStep=idx<0?0:idx;}R();}
function togForm(){S.showForm=!S.showForm;_ik=false;R();if(S.showForm)setTimeout(function(){var f=document.getElementById('order-form');if(f)f.scrollIntoView({behavior:'smooth',block:'start'});},60);}
function togIK(){_ik=!_ik;R();}
function togEditIK(id){for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===id){S.orders[i].inKind=!S.orders[i].inKind;break;}}R();}
function setFocus(i){S.focusStep=i;R();}
function navStep(i){if(i>=0&&i<STEPS.length){S.focusStep=i;R();}}
function startEdit(id){S.editId=id;R();}
function cancelEdit(){S.editId=null;R();}
function createOrd(){
  var ik=_ik;var moe=document.getElementById('f-moe');
  var o={id:uid(),fi:document.getElementById('f-fi').value,fiv:document.getElementById('f-fiv').value,gestora:document.getElementById('f-gest').value.trim(),tipo:document.getElementById('f-tipo').value,valor:parseFloat(document.getElementById('f-val').value)||0,moeda:ik?'SHARES':(moe?moe.value:'USD'),wire:document.getElementById('f-wire').value||null,inKind:ik,valorConfirmado:null,steps:STEPS.map(function(){return{done:false,obs:''};},this),createdAt:new Date().toISOString()};
  S.orders.unshift(o);S.showForm=false;saveO();R();
}
function saveEditOrd(id){
  for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===id){var o=S.orders[i];o.fi=document.getElementById('f-fi').value;o.fiv=document.getElementById('f-fiv').value;o.gestora=document.getElementById('f-gest').value.trim();o.tipo=document.getElementById('f-tipo').value;o.valor=parseFloat(document.getElementById('f-val').value)||0;var moe=document.getElementById('f-moe');o.moeda=o.inKind?'SHARES':(moe?moe.value:'USD');o.wire=document.getElementById('f-wire').value||null;break;}}
  S.editId=null;saveO();R();
}
function delOrd(id){S.orders=S.orders.filter(function(o){return o.id!==id;});S.view='orders';S.editId=null;saveO();R();}
function togStep(id,idx,val){
  for(var i=0;i<S.orders.length;i++){
    if(S.orders[i].id===id){
      S.orders[i].steps[idx].done=val;
      if(val){
        var next=idx+1;
        if(next<STEPS.length) S.focusStep=next;
      }
      break;
    }
  }
  saveO();R();
}
function updObs(el){for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===el.dataset.oid){S.orders[i].steps[parseInt(el.dataset.idx)].obs=el.value;break;}}saveO();}
function updConfirmado(id,val){for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===id){S.orders[i].valorConfirmado=val===''?null:parseFloat(val);break;}}saveO();R();}
function resetSt(id){for(var i=0;i<S.orders.length;i++){if(S.orders[i].id===id){S.orders[i].steps.forEach(function(s){s.done=false;s.obs='';});break;}}saveO();R();}
function addF(t){if(!S.funds[t])S.funds[t]=[];S.funds[t].push('');saveF();R();}
function editF(t,i,v){if(S.funds[t])S.funds[t][i]=v;saveF();}
function rmvF(t,i){if(S.funds[t])S.funds[t].splice(i,1);saveF();R();}
var _admSearchTimer=null;
function admSearch(v){S.admSearch=v;clearTimeout(_admSearchTimer);_admSearchTimer=setTimeout(function(){R();},300);}
function admEditInline(i){
  var v=prompt('Editar gestora:',S.funds.admins[i]);
  if(v===null)return;
  S.funds.admins[i]=v.trim();saveF();R();
}
function addAdm(){var c=document.getElementById('adm-new');if(!c||c.innerHTML)return;c.innerHTML='<div style="display:flex;gap:6px;margin-bottom:10px"><input type="text" id="adm-input" placeholder="Nome da gestora/administradora..." style="flex:1"><button class="btn sm p" onclick="saveAdm()">Adicionar</button></div>';setTimeout(function(){var el=document.getElementById('adm-input');if(el)el.focus();},50);}
function saveAdm(){var el=document.getElementById('adm-input');if(!el)return;var v=el.value.trim();if(!v)return;if(!S.funds.admins)S.funds.admins=[];S.funds.admins.push(v);saveF();R();}

// ─── ONSHORE ACTIONS ──────────────────────────────────────
var _searchTimer=null;
function onSearch(v){
  S.onSearch=v;
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(function(){R();},400);
}
function onOpenDetail(i){S.onDetail=S.onDetail===i?null:i;S.onEdit=null;R();}
function closeOnDetail(){S.onDetail=null;R();}
function onNewFund(){S.onNew=true;S.onDetail=null;S.onEdit=null;R();setTimeout(function(){var f=document.getElementById('order-form')||document.querySelector('.ifrm');if(f)f.scrollIntoView({behavior:'smooth',block:'start'});},60);}
function cancelOnNew(){S.onNew=false;R();}
function saveOnNew(){
  var row=[];
  for(var i=0;i<ON_COLS.length;i++){var el=document.getElementById('onf-'+i);row.push(el?el.value.trim():'');}
  S.onshore.push(row);S.onNew=false;saveOn();R();
}
function onEditFund(i){S.onEdit=i;S.onDetail=null;R();}
function cancelOnEdit(){S.onEdit=null;R();}
function saveOnEdit(){
  var i=S.onEdit;if(i===null)return;
  var row=[];
  for(var c=0;c<ON_COLS.length;c++){var el=document.getElementById('onf-'+c);row.push(el?el.value.trim():'');}
  S.onshore[i]=row;S.onEdit=null;saveOn();R();
}
function onDelFund(i){if(!confirm('Excluir este fundo da Base Onshore?'))return;S.onshore.splice(i,1);S.onDetail=null;S.onEdit=null;saveOn();R();}
